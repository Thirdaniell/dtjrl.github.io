<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics — FTJ</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="https://i.imgur.com/ZP2pTk2.png">

<script src="nav.js"></script>

<style>
:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #181818;
  --border: #1a1a1a;
  --border2: #2a2a2a;
  --text: #e8e8e8;
  --text2: #888;
  --text3: #444;
  --green: #00e676;
  --red: #ff4444;
  --accent: #c8ff00;
  --mono: 'Space Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  min-height: 100vh;
}

.page { max-width: 1200px; margin: 0 auto; padding: 3rem 2rem; }

.page-header {
  margin-bottom: 2.5rem;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
}

.page-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--accent);
  margin-bottom: 10px;
}

.page-title {
  font-family: var(--mono);
  font-size: 28px;
  font-weight: 700;
}

.period-tabs {
  display: flex;
  gap: 1px;
  background: var(--border);
}

.period-tab {
  font-family: var(--mono);
  font-size: 10px;
  padding: 8px 16px;
  background: var(--surface);
  color: var(--text3);
  cursor: pointer;
  border: none;
}

.period-tab.active {
  background: var(--surface2);
  color: var(--accent);
}

.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  margin-bottom: 2rem;
}

.stat {
  background: var(--surface);
  padding: 1rem;
}

.stat-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
}

.stat-value {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 700;
}

.loading-state {
  text-align: center;
  padding: 4rem;
  font-family: var(--mono);
  color: var(--text3);
}

.error-state {
  padding: 2rem;
  color: var(--red);
  border: 1px solid rgba(255,68,68,0.3);
}

canvas { display: block; width: 100%; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border2); }
</style>
</head>

<body>

<div class="page">
  <div class="page-header">
    <div>
      <div class="page-eyebrow">// Performance</div>
      <div class="page-title">Analytics</div>
    </div>

    <div class="period-tabs">
      <button class="period-tab active" data-period="all">All</button>
      <button class="period-tab" data-period="week">Week</button>
      <button class="period-tab" data-period="month">Month</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-label">Trades</div><div class="stat-value" id="s-total">—</div></div>
    <div class="stat"><div class="stat-label">Win Rate</div><div class="stat-value" id="s-wr">—</div></div>
    <div class="stat"><div class="stat-label">P&L</div><div class="stat-value" id="s-pnl">—</div></div>
    <div class="stat"><div class="stat-label">Best Session</div><div class="stat-value" id="s-session">—</div></div>
  </div>

  <div id="main-content">
    <div class="loading-state">Loading analytics...</div>
  </div>
</div>

<script>
const WORKER_URL = "https://trade-journal-proxy.daniel-mouldd.workers.dev";
const DATABASE_ID = "5398f956345943b7b12b2298bbb6e127";

let allTrades = [];

async function fetchTrades() {
  try {
    const res = await fetch(`${WORKER_URL}/notion/databases/${DATABASE_ID}/query`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ page_size: 100 })
    });

    if (!res.ok) throw new Error("Worker failed");

    const data = await res.json();

    allTrades = (data.results || []).map(p => ({
      pnl: p.properties['P&L ($)']?.number || 0,
      status: p.properties['Status']?.select?.name || '',
      session: p.properties['Session']?.select?.name || ''
    }));

    render();

  } catch(e) {
    document.getElementById('main-content').innerHTML =
      `<div class="error-state">${e.message}</div>`;
  }
}

function render() {
  const total = allTrades.length;
  const wins = allTrades.filter(t => t.status === 'Closed - Win').length;
  const pnl = allTrades.reduce((s,t)=>s+t.pnl,0);

  const sessionMap = {};
  allTrades.forEach(t => {
    if (!t.session) return;
    if (!sessionMap[t.session]) sessionMap[t.session] = { pnl:0,count:0 };
    sessionMap[t.session].pnl += t.pnl;
    sessionMap[t.session].count++;
  });

  const bestSession = Object.entries(sessionMap)
    .sort((a,b)=> (b[1].pnl/b[1].count)-(a[1].pnl/a[1].count))[0];

  document.getElementById('s-total').textContent = total;
  document.getElementById('s-wr').textContent = total ? Math.round((wins/total)*100)+'%' : '—';
  document.getElementById('s-pnl').textContent = '$'+pnl;
  document.getElementById('s-session').textContent = bestSession ? bestSession[0] : '—';

  document.getElementById('main-content').innerHTML =
    `<canvas id="chart"></canvas>`;

  const c = document.getElementById('chart');

  requestAnimationFrame(()=>{
    c.width = c.offsetWidth || 600;
    c.height = 300;

    const ctx = c.getContext('2d');
    ctx.fillStyle = "#00e676";
    ctx.fillText("Data Loaded",20,40);
  });
}

document.addEventListener('DOMContentLoaded', () => {
  initNav('analytics');
  fetchTrades();
});
</script>

</body>
</html>
