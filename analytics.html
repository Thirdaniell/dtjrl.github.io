<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics — FTJ</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="https://i.imgur.com/ZP2pTk2.png">
<link rel="stylesheet" href="mobile.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="nav.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #181818;
    --border: #1a1a1a;
    --border2: #2a2a2a;
    --text: #e8e8e8;
    --text2: #888;
    --text3: #444;
    --green: #00e676;
    --red: #ff4444;
    --accent: #c8ff00;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; min-height: 100vh; }

  .page { max-width: 1200px; margin: 0 auto; padding: 3rem 2rem; }

  .page-header { margin-bottom: 2.5rem; display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
  .page-eyebrow { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
  .page-title { font-family: var(--mono); font-size: 28px; font-weight: 700; color: var(--text); line-height: 1.1; }

  .period-tabs { display: flex; gap: 1px; background: var(--border); }
  .period-tab {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 16px;
    background: var(--surface);
    color: var(--text3);
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  .period-tab:hover { color: var(--text2); }
  .period-tab.active { background: var(--surface2); color: var(--accent); }

  .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); margin-bottom: 2rem; }
  .stat { background: var(--surface); padding: 1.25rem 1.5rem; }
  .stat-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; color: var(--text3); text-transform: uppercase; margin-bottom: 8px; }
  .stat-value { font-family: var(--mono); font-size: 18px; font-weight: 700; color: var(--text); line-height: 1.2; }
  .stat-sub { font-family: var(--mono); font-size: 9px; color: var(--text3); margin-top: 3px; letter-spacing: 0.08em; }
  .stat-value.pos { color: var(--green); }
  .stat-value.neg { color: var(--red); }

  .charts-grid { display: grid; grid-template-columns: 1fr 340px; gap: 1px; background: var(--border); margin-bottom: 2rem; }
  .chart-panel { background: var(--surface); padding: 1.5rem; }
  .chart-panel-title { font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; color: var(--text3); text-transform: uppercase; margin-bottom: 1.25rem; }

  canvas { display: block; }

  .donut-wrap { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
  .donut-canvas { position: relative; }
  .donut-legend { width: 100%; display: flex; flex-direction: column; gap: 8px; }
  .legend-item { display: flex; align-items: center; justify-content: space-between; font-family: var(--mono); font-size: 11px; }
  .legend-left { display: flex; align-items: center; gap: 8px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .legend-name { color: var(--text2); }
  .legend-pct { color: var(--text3); }

  .loading-state { text-align: center; padding: 5rem 2rem; font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; color: var(--text3); text-transform: uppercase; }
  .loading-state span { animation: blink 1s infinite; display: inline-block; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .error-state { padding: 2rem; font-family: var(--mono); font-size: 11px; color: var(--red); background: rgba(255,68,68,0.05); border: 1px solid rgba(255,68,68,0.2); }
  .insights-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); margin-bottom: 1rem; }
  .insight-card { background: var(--surface); padding: 1rem 1.25rem; }
  .insight-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; }
  .insight-value { font-family: var(--mono); font-size: 18px; font-weight: 700; color: var(--text); }
  .insight-value.pos { color: var(--green); }
  .insight-value.neg { color: var(--red); }
  .insight-sub { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-top: 2px; }
  .grade-dist { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .gdist-item { display: flex; align-items: center; gap: 4px; }
  .gdist-grade { font-family: var(--mono); font-size: 9px; padding: 2px 6px; border: 1px solid; }
  .gdist-App { color:#c8ff00; border-color:rgba(200,255,0,0.4); }
  .gdist-Ap { color:#00e676; border-color:rgba(0,230,118,0.4); }
  .gdist-A { color:#40c4ff; border-color:rgba(64,196,255,0.4); }
  .gdist-B { color:#ffd740; border-color:rgba(255,215,64,0.4); }
  .gdist-C { color:#ff6d00; border-color:rgba(255,109,0,0.4); }
  .gdist-D { color:#ff4444; border-color:rgba(255,68,68,0.4); }
  .gdist-count { font-family: var(--mono); font-size: 10px; color: var(--text3); }
  @media(max-width:900px){ .insights-row { grid-template-columns: repeat(2,1fr); } }

  .cal-panel { background: var(--surface); padding: 1.5rem; margin-bottom: 2rem; border: 1px solid var(--border); }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
  .cal-nav { display: flex; align-items: center; gap: 12px; }
  .cal-nav-btn { font-family: var(--mono); font-size: 14px; background: none; border: 1px solid var(--border2); color: var(--text2); width: 28px; height: 28px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
  .cal-nav-btn:hover { color: var(--accent); border-color: var(--accent); }
  .cal-month-label { font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em; color: var(--text); text-transform: uppercase; min-width: 140px; text-align: center; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); }
  .cal-day-header { background: var(--bg); font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; color: var(--text3); text-transform: uppercase; text-align: center; padding: 6px 0; }
  .cal-cell { background: var(--surface); min-height: 70px; padding: 6px 8px; display: flex; flex-direction: column; gap: 3px; }
  .cal-cell.empty { background: var(--bg); }
  .cal-cell.today { background: var(--surface2); outline: 1px solid var(--border2); }
  .cal-date { font-family: var(--mono); font-size: 10px; color: var(--text3); }
  .cal-pnl { font-family: var(--mono); font-size: 12px; font-weight: 700; margin-top: auto; }
  .cal-pnl.pos { color: var(--green); }
  .cal-pnl.neg { color: var(--red); }
  .cal-trades { font-family: var(--mono); font-size: 9px; color: var(--text3); }
  .cal-cell.has-trades { background: var(--surface2); }

  @media (max-width: 900px) {
    .charts-grid { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 600px) {
    .page { padding: 2rem 1rem; }
    .stats-row { grid-template-columns: repeat(2, 1fr); font-size:11px; }
    .cal-cell { min-height: 50px; }
    .cal-pnl { font-size: 10px; }
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
</style>
</head>
<body>
<div class="page">
  <div class="page-header">
    <div>
      <div class="page-eyebrow">// Performance</div>
      <div class="page-title">Analytics</div>
    </div>
    <div class="period-tabs">
      <button class="period-tab active" data-period="all">All</button>
      <button class="period-tab" data-period="week">Week</button>
      <button class="period-tab" data-period="month">Month</button>
      <button class="period-tab" data-period="3month">3M</button>
    </div>
  </div>

  <div id="stats-row" class="stats-row">
    <div class="stat"><div class="stat-label">Trades</div><div class="stat-value" id="s-total">—</div></div>
    <div class="stat"><div class="stat-label">Win Rate</div><div class="stat-value" id="s-wr">—</div></div>
    <div class="stat"><div class="stat-label">Total P&L</div><div class="stat-value" id="s-pnl">—</div></div>
    <div class="stat"><div class="stat-label">Avg P&L</div><div class="stat-value" id="s-avg">—</div></div>
    <div class="stat"><div class="stat-label">Best Trade</div><div class="stat-value pos" id="s-best">—</div></div>
    <div class="stat"><div class="stat-label">Streak</div><div class="stat-value" id="s-streak">—</div><div class="stat-sub" id="s-streak-sub"></div></div>
    <div class="stat"><div class="stat-label">Best Session</div><div class="stat-value" id="s-session">—</div></div>
    <div class="stat"><div class="stat-label">Avg R:R</div><div class="stat-value" id="s-rr">—</div><div class="stat-sub">risk to reward</div></div>
    <div class="stat"><div class="stat-label">Avg Duration</div><div class="stat-value" id="s-dur">—</div><div class="stat-sub">time in trade</div></div>
  </div>

  <div id="main-content"><div class="loading-state">Loading analytics <span>...</span></div></div>

<!-- calendar rendered dynamically inside main-content -->
</div>

<script>
const WORKER_URL = "https://trade-journal-proxy.daniel-mouldd.workers.dev";
const DATABASE_ID = "5398f956345943b7b12b2298bbb6e127";

const INSTRUMENT_COLORS = {
  'NQ': '#c8ff00', 'ES': '#00e676', 'MNQ': '#40c4ff',
  'MES': '#ff6d00', 'CL': '#ea80fc', 'GC': '#ffd740',
  'RTY': '#ff4444', 'Other': '#888'
};

let allTrades = [];
let equityChartInst = null;
let donutChartInst = null;
let gradeChartInst = null;

function destroyChart(inst) { try { if (inst) inst.destroy(); } catch(e) {} }

// Chart.js global defaults — dark theme
Chart.defaults.color = '#888';
Chart.defaults.borderColor = '#2a2a2a';
Chart.defaults.font.family = 'Space Mono, monospace';
Chart.defaults.font.size = 11;
let currentPeriod = 'all';
let equityChart = null;
let donutChart = null;

async function fetchTrades() {
  try {
    let pages = [], cursor = null;
    do {
      const body = { page_size: 100 };
      if (cursor) body.start_cursor = cursor;
      const res = await fetch(`${WORKER_URL}/notion/databases/${DATABASE_ID}/query`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error(`Worker error: ${res.status}`);
      const data = await res.json();
      pages = pages.concat(data.results || []);
      cursor = data.has_more ? data.next_cursor : null;
    } while (cursor);

    allTrades = pages.map(page => {
      const p = page.properties;
      return {
        instrument: p['Instrument']?.select?.name || 'Other',
        pnl: p['P&L ($)']?.number || 0,
        status: p['Status']?.select?.name || '',
        date: p['Date']?.date?.start || '',
        session: p['Session']?.select?.name || '',
        grade: p['Setup Grade']?.select?.name || '',
        direction: p['Direction']?.select?.name || '',
        timeframe: p['Timeframe']?.select?.name || '',
        confluences: p['Confluences']?.multi_select?.map(o => o.name) || [],
        rrStored: p['R:R']?.number,
        durationStored: p['Duration (mins)']?.number,
        entryPrice: p['Entry Price']?.number,
        exitPrice: p['Exit Price']?.number,
        stopLoss: p['Stop Loss']?.number,
        takeProfit: p['Take Profit']?.number,
        entryTime: (p['Entry Time']?.rich_text||[]).map(r=>r.plain_text).join(''),
        exitTime: (p['Exit Time']?.rich_text||[]).map(r=>r.plain_text).join(''),
      };
    }).map(t => {
      // Auto-calculate R:R from entry/SL/TP if not stored
      if (t.rrStored != null) {
        t.rr = t.rrStored;
      } else if (t.entryPrice != null && t.stopLoss != null && t.takeProfit != null) {
        const risk = Math.abs(t.entryPrice - t.stopLoss);
        const reward = Math.abs(t.takeProfit - t.entryPrice);
        t.rr = risk > 0 ? Math.round((reward / risk) * 100) / 100 : null;
      } else {
        t.rr = null;
      }
      // Auto-calculate duration from entry/exit time if not stored
      if (t.durationStored != null) {
        t.duration = t.durationStored;
      } else if (t.entryTime && t.exitTime) {
        const parseTime = s => {
          const m = s.match(/(\d{1,2}):(\d{2})\s*(AM|PM)?/i);
          if (!m) return null;
          let h = parseInt(m[1]), min = parseInt(m[2]);
          const ap = (m[3]||'').toUpperCase();
          if (ap === 'PM' && h < 12) h += 12;
          if (ap === 'AM' && h === 12) h = 0;
          return h * 60 + min;
        };
        const eMin = parseTime(t.entryTime), xMin = parseTime(t.exitTime);
        t.duration = (eMin != null && xMin != null && xMin > eMin) ? xMin - eMin : null;
      } else {
        t.duration = null;
      }
      return t;
    }).filter(t => t.date).sort((a,b) => a.date.localeCompare(b.date));

    renderAll();
  } catch(e) {
    document.getElementById('main-content').innerHTML = `<div class="error-state">Error: ${e.message}</div>`;
  }
}

function filterByPeriod(trades, period) {
  if (period === 'all') return trades;
  const now = new Date();
  const cutoff = new Date();
  if (period === 'week') cutoff.setDate(now.getDate() - 7);
  else if (period === 'month') cutoff.setMonth(now.getMonth() - 1);
  else if (period === '3month') cutoff.setMonth(now.getMonth() - 3);
  return trades.filter(t => new Date(t.date) >= cutoff);
}

function setText(id, text, cls) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  if (cls) el.className = cls;
}

function updateStats(trades) {
  const total = trades.length;
  const wins = trades.filter(t => t.status === 'Closed - Win').length;
  const losses = trades.filter(t => t.status === 'Closed - Loss').length;
  const pnl = trades.reduce((s,t) => s + t.pnl, 0);
  const avg = total ? Math.round(pnl / total) : 0;
  const best = total ? Math.max(...trades.map(t => t.pnl)) : 0;

  // Streaks
  let curWin=0,curLoss=0,maxWin=0,maxLoss=0;
  const sorted = [...trades].sort((a,b)=>a.date.localeCompare(b.date));
  sorted.forEach(t => {
    if (t.status === 'Closed - Win') { curWin++; maxWin=Math.max(maxWin,curWin); curLoss=0; }
    else if (t.status === 'Closed - Loss') { curLoss++; maxLoss=Math.max(maxLoss,curLoss); curWin=0; }
  });

  // Best session
  const sessionMap = {};
  trades.forEach(t => {
    if (!t.session) return;
    if (!sessionMap[t.session]) sessionMap[t.session] = { pnl:0, count:0 };
    sessionMap[t.session].pnl += t.pnl;
    sessionMap[t.session].count++;
  });
  const bestSession = Object.entries(sessionMap).sort((a,b)=>b[1].pnl-a[1].pnl)[0];

  setText('s-total', total);
  setText('s-wr', total ? Math.round((wins/total)*100)+'%' : '—');
  setText('s-pnl', total ? (pnl>=0?'+':'-')+'$'+Math.abs(pnl).toLocaleString() : '—', 'stat-value'+(pnl>0?' pos':pnl<0?' neg':''));
  setText('s-avg', total ? (avg>=0?'+':'-')+'$'+Math.abs(avg).toLocaleString() : '—', 'stat-value'+(avg>0?' pos':avg<0?' neg':''));
  setText('s-best', best ? '+$'+best.toLocaleString() : '—');
  // Combined streak - show current streak direction
  const streakEl = document.getElementById('s-streak');
  const streakSubEl = document.getElementById('s-streak-sub');
  if (streakEl) {
    if (sorted.length === 0) { streakEl.textContent = '—'; streakEl.className = 'stat-value'; }
    else {
      const lastStatus = sorted[sorted.length-1].status;
      const isWinStreak = lastStatus === 'Closed - Win';
      let currentStreak = 0;
      for (let i = sorted.length-1; i >= 0; i--) {
        const s = sorted[i].status === 'Closed - Win' ? 'W' : 'L';
        const expected = isWinStreak ? 'W' : 'L';
        if (s === expected) currentStreak++;
        else break;
      }
      streakEl.textContent = currentStreak + (isWinStreak ? 'W' : 'L');
      streakEl.className = 'stat-value ' + (isWinStreak ? 'pos' : 'neg');
      if (streakSubEl) streakSubEl.textContent = 'best: ' + (isWinStreak ? maxWin : maxLoss);
    }
  }
  setText('s-session', bestSession ? bestSession[0] : '—');

  document.getElementById('s-best').textContent = best ? '+$' + best.toLocaleString() : '—';

  const rrs = trades.filter(t => t.rr != null).map(t => t.rr);
  const avgRR = rrs.length ? (rrs.reduce((a,b)=>a+b,0)/rrs.length).toFixed(2) : null;
  setText('s-rr', avgRR ? '1:' + avgRR : '—');

  const durs = trades.filter(t => t.duration != null).map(t => t.duration);
  const avgDur = durs.length ? Math.round(durs.reduce((a,b)=>a+b,0)/durs.length) : null;
  setText('s-dur', avgDur ? (avgDur < 60 ? avgDur + 'm' : Math.floor(avgDur/60) + 'h ' + (avgDur%60) + 'm') : '—');

  // Update stat font size for long values
  ['s-rr','s-dur','s-wstreak','s-lstreak'].forEach(id => {
    const el = document.getElementById(id);
    if (el && el.textContent.length > 5) el.style.fontSize = '14px';
    else if (el) el.style.fontSize = '';
  });


}

function renderEquityChart(trades) {
  const canvas = document.getElementById('equity-canvas');
  if (!canvas) return;
  destroyChart(equityChartInst);

  if (!trades.length) return;

  let cumulative = 0;
  const sorted = [...trades].sort((a,b) => a.date.localeCompare(b.date));
  const labels = ['Start'];
  const data = [0];
  sorted.forEach(t => {
    cumulative += t.pnl;
    labels.push(t.date.slice(5));
    data.push(cumulative);
  });

  const isPositive = cumulative >= 0;
  const lineColor = isPositive ? '#00e676' : '#ff4444';

  equityChartInst = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Equity',
        data,
        borderColor: lineColor,
        borderWidth: 2,
        pointBackgroundColor: lineColor,
        pointRadius: 4,
        pointHoverRadius: 6,
        fill: true,
        backgroundColor: (ctx) => {
          const gradient = ctx.chart.ctx.createLinearGradient(0, 0, 0, ctx.chart.height);
          gradient.addColorStop(0, isPositive ? 'rgba(0,230,118,0.25)' : 'rgba(255,68,68,0.25)');
          gradient.addColorStop(1, 'rgba(0,0,0,0)');
          return gradient;
        },
        tension: 0.3,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#181818',
          borderColor: '#2a2a2a',
          borderWidth: 1,
          titleColor: '#888',
          bodyColor: '#e8e8e8',
          callbacks: {
            label: ctx => (ctx.raw >= 0 ? '+' : '') + '$' + ctx.raw.toLocaleString()
          }
        }
      },
      scales: {
        x: {
          grid: { color: '#1a1a1a' },
          ticks: { color: '#444', maxTicksLimit: 8, font: { size: 10 } }
        },
        y: {
          grid: { color: '#1a1a1a' },
          ticks: {
            color: '#444',
            font: { size: 10 },
            callback: v => (v >= 0 ? '+' : '') + '$' + Math.abs(v).toLocaleString()
          }
        }
      }
    }
  });
}

function renderDonut(trades) {
  const canvas = document.getElementById('donut-canvas');
  const legendEl = document.getElementById('donut-legend');
  if (!canvas || !legendEl) return;

  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Count by instrument
  const counts = {};
  trades.forEach(t => { counts[t.instrument] = (counts[t.instrument] || 0) + 1; });
  const total = trades.length;
  if (!total) {
    ctx.fillStyle = '#444';
    ctx.font = '11px Space Mono';
    ctx.textAlign = 'center';
    ctx.fillText('NO DATA', W/2, H/2);
    legendEl.innerHTML = '';
    return;
  }

  const entries = Object.entries(counts).sort((a,b) => b[1]-a[1]);
  const cx = W/2, cy = H/2, r = Math.min(W,H)/2 - 10, inner = r * 0.58;

  let startAngle = -Math.PI / 2;
  entries.forEach(([inst, count]) => {
    const slice = (count / total) * Math.PI * 2;
    const color = INSTRUMENT_COLORS[inst] || '#888';
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, startAngle + slice);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx, cy, inner, 0, Math.PI * 2);
    ctx.fillStyle = '#111';
    ctx.fill();
    startAngle += slice;
  });

  // Center text
  ctx.fillStyle = '#e8e8e8';
  ctx.font = 'bold 20px Space Mono';
  ctx.textAlign = 'center';
  ctx.fillText(total, cx, cy + 4);
  ctx.fillStyle = '#444';
  ctx.font = '9px Space Mono';
  ctx.fillText('TRADES', cx, cy + 18);

  // Legend
  legendEl.innerHTML = entries.map(([inst, count]) => `
    <div class="legend-item">
      <div class="legend-left">
        <div class="legend-dot" style="background:${INSTRUMENT_COLORS[inst] || '#888'}"></div>
        <span class="legend-name">${inst}</span>
      </div>
      <span class="legend-pct">${count} · ${Math.round((count/total)*100)}%</span>
    </div>
  `).join('');
}

function renderGradeChart(trades) {
  const canvas = document.getElementById('grade-canvas');
  if (!canvas) return;
  canvas.width = canvas.offsetWidth; canvas.height = 180;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const grades = ['A++','A+','A','B','C','D'];
  const colors = ['#c8ff00','#00e676','#40c4ff','#ffd740','#ff6d00','#ff4444'];
  const counts = {};
  grades.forEach(g => counts[g] = 0);
  trades.forEach(t => { if (t.grade && counts[t.grade] !== undefined) counts[t.grade]++; });

  const max = Math.max(...Object.values(counts), 1);
  const pad = { top: 10, right: 16, bottom: 30, left: 30 };
  const cW = W - pad.left - pad.right;
  const cH = H - pad.top - pad.bottom;
  const barW = cW / grades.length * 0.6;
  const gap = cW / grades.length;

  grades.forEach((g, i) => {
    const count = counts[g];
    const x = pad.left + i * gap + gap * 0.2;
    const barH = count ? (count / max) * cH : 0;
    const y = pad.top + cH - barH;
    ctx.fillStyle = colors[i];
    ctx.globalAlpha = 0.85;
    ctx.fillRect(x, y, barW, barH);
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#444';
    ctx.font = '9px Space Mono';
    ctx.textAlign = 'center';
    ctx.fillText(g, x + barW/2, H - pad.bottom + 14);
    if (count) {
      ctx.fillStyle = colors[i];
      ctx.fillText(count, x + barW/2, y - 4);
    }
  });
}

function renderSessionChart(trades) {
  const canvas = document.getElementById('session-canvas');
  if (!canvas) return;
  canvas.width = canvas.offsetWidth; canvas.height = 180;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const sessions = ['Asia','London','NY AM','NY Lunch','NY PM','Overnight'];
  const pnlMap = {};
  sessions.forEach(s => pnlMap[s] = 0);
  trades.forEach(t => { if (t.session && pnlMap[t.session] !== undefined) pnlMap[t.session] += t.pnl; });

  const vals = Object.values(pnlMap);
  const max = Math.max(...vals.map(Math.abs), 1);
  const pad = { top: 10, right: 16, bottom: 30, left: 50 };
  const cW = W - pad.left - pad.right;
  const cH = H - pad.top - pad.bottom;
  const barW = cW / sessions.length * 0.6;
  const gap = cW / sessions.length;
  const zeroY = pad.top + cH / 2;

  ctx.beginPath();
  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = 1;
  ctx.moveTo(pad.left, zeroY);
  ctx.lineTo(W - pad.right, zeroY);
  ctx.stroke();

  sessions.forEach((s, i) => {
    const val = pnlMap[s];
    const x = pad.left + i * gap + gap * 0.2;
    const barH = (Math.abs(val) / max) * (cH / 2);
    const isPos = val >= 0;
    const y = isPos ? zeroY - barH : zeroY;
    ctx.fillStyle = isPos ? '#00e676' : '#ff4444';
    ctx.globalAlpha = 0.8;
    ctx.fillRect(x, y, barW, barH);
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#444';
    ctx.font = '8px Space Mono';
    ctx.textAlign = 'center';
    const label = s.length > 6 ? s.replace('NY ', 'NY\n') : s;
    ctx.fillText(s.substring(0,6), x + barW/2, H - pad.bottom + 14);
    if (val !== 0) {
      ctx.fillStyle = isPos ? '#00e676' : '#ff4444';
      ctx.font = '8px Space Mono';
      const pStr = (isPos?'+':'') + '$' + Math.abs(Math.round(val/1000)) + 'k';
      ctx.fillText(val > 999 || val < -999 ? pStr : (isPos?'+':'') + '$' + Math.abs(val), x + barW/2, isPos ? y - 4 : y + barH + 10);
    }
  });
}

function renderGradeDist(trades) {
  const canvas = document.getElementById('grade-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const grades = ['A++','A+','A','A-','B+','B','B-','C','D'];
  const colors = {'A++':'#c8ff00','A+':'#00e676','A':'#00c853','A-':'#40c4ff','B+':'#ffd740','B':'#ffab40','B-':'#ff8f00','C':'#ff6d00','D':'#ff4444'};
  const counts = {};
  grades.forEach(g => counts[g] = 0);
  trades.forEach(t => { if (t.grade && counts[t.grade] !== undefined) counts[t.grade]++; });
  const total = Object.values(counts).reduce((a,b)=>a+b,0);

  if (!total) {
    ctx.fillStyle = '#444'; ctx.font = '11px Space Mono'; ctx.textAlign = 'center';
    ctx.fillText('NO DATA', W/2, H/2); return;
  }

  const cx = W * 0.38, cy = H / 2;
  const r = Math.min(cx, cy) - 16;
  const inner = r * 0.55;
  let startAngle = -Math.PI / 2;

  const slices = grades.filter(g => counts[g] > 0);

  slices.forEach(g => {
    const slice = (counts[g] / total) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, startAngle + slice);
    ctx.closePath();
    ctx.fillStyle = colors[g];
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx, cy, inner, 0, Math.PI * 2);
    ctx.fillStyle = '#111';
    ctx.fill();
    startAngle += slice;
  });

  // Center label
  ctx.fillStyle = '#e8e8e8';
  ctx.font = 'bold 22px Space Mono';
  ctx.textAlign = 'center';
  ctx.fillText(total, cx, cy + 6);
  ctx.fillStyle = '#444';
  ctx.font = '9px Space Mono';
  ctx.fillText('TRADES', cx, cy + 20);

  // Legend on the right
  const legendX = W * 0.62;
  let legendY = cy - (slices.length * 22) / 2;
  slices.forEach(g => {
    const pct = Math.round((counts[g] / total) * 100);
    ctx.fillStyle = colors[g];
    ctx.fillRect(legendX, legendY - 9, 10, 10);
    ctx.fillStyle = '#e8e8e8';
    ctx.font = 'bold 11px Space Mono';
    ctx.textAlign = 'left';
    ctx.fillText(g, legendX + 16, legendY);
    ctx.fillStyle = '#666';
    ctx.font = '10px Space Mono';
    ctx.fillText(`${counts[g]} · ${pct}%`, legendX + 16, legendY + 13);
    legendY += 32;
  });
}

function renderSessionPnl(trades) {
  const el = document.getElementById('session-cards');
  if (!el) return;

  const sessions = {};
  trades.forEach(t => {
    if (!t.session) return;
    if (!sessions[t.session]) sessions[t.session] = { pnl: 0, wins: 0, total: 0 };
    sessions[t.session].pnl += t.pnl;
    sessions[t.session].total++;
    if (t.status === 'Closed - Win') sessions[t.session].wins++;
  });

  const entries = Object.entries(sessions).sort((a,b) => b[1].pnl - a[1].pnl);

  if (!entries.length) {
    el.innerHTML = '<div style="font-family:var(--mono);font-size:11px;color:var(--text3);padding:1rem;">No data</div>';
    return;
  }

  el.innerHTML = entries.map(([sess, d]) => {
    const isPos = d.pnl >= 0;
    const pnlStr = (isPos ? '+' : '-') + '$' + Math.abs(d.pnl).toLocaleString();
    const wr = Math.round((d.wins / d.total) * 100);
    return `<div style="background:var(--surface);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--text);letter-spacing:0.08em;">${sess}</div>
        <div style="font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:3px;">${d.total} trade${d.total>1?'s':''} · ${wr}% win</div>
      </div>
      <div style="font-family:var(--mono);font-size:20px;font-weight:700;color:${isPos?'#00e676':'#ff4444'};">${pnlStr}</div>
    </div>`;
  }).join('');
}

function renderConfWinRate(trades) {
  const canvas = document.getElementById('conf-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const confStats = {};
  trades.forEach(t => {
    (t.confluences || []).forEach(c => {
      if (!confStats[c]) confStats[c] = { wins: 0, total: 0 };
      confStats[c].total++;
      if (t.status === 'Closed - Win') confStats[c].wins++;
    });
  });

  const minUsage = Math.max(2, Math.floor(Object.values(confStats).reduce((s,v)=>s+v.total,0) / 15));
  const entries = Object.entries(confStats)
    .filter(([,v]) => v.total >= Math.min(minUsage, 3))
    .map(([name, v]) => ({ name, wr: Math.round((v.wins/v.total)*100), total: v.total }))
    .sort((a,b) => b.wr - a.wr);

  if (!entries.length) {
    el.innerHTML = '<div style="font-family:var(--mono);font-size:11px;color:var(--text3);padding:1rem;">Not enough data yet — needs more trades.</div>';
    return;
  }

  if (!entries.length) {
    ctx.fillStyle = '#444'; ctx.font = '11px Space Mono'; ctx.textAlign = 'center';
    ctx.fillText('NO DATA', W/2, H/2); return;
  }

  const pad = { top: 16, right: 60, bottom: 16, left: 140 };
  const rowH = Math.min(32, Math.floor((H - pad.top - pad.bottom) / entries.length));
  const trackW = W - pad.left - pad.right;

  // Resize canvas height to fit all entries
  const neededH = pad.top + pad.bottom + entries.length * rowH;
  if (canvas.height < neededH) {
    canvas.height = neededH;
    canvas.style.height = neededH + 'px';
  }
  ctx.clearRect(0, 0, W, canvas.height);

  entries.forEach((e, i) => {
    const y = pad.top + i * rowH + rowH / 2;
    const color = e.wr >= 70 ? '#00e676' : e.wr >= 50 ? '#ffd740' : '#ff4444';
    const fillW = (e.wr / 100) * trackW;

    // Row bg
    ctx.fillStyle = i % 2 === 0 ? 'rgba(255,255,255,0.02)' : 'transparent';
    ctx.fillRect(0, pad.top + i * rowH, W, rowH);

    // Label
    ctx.fillStyle = '#888';
    ctx.font = '10px Space Mono';
    ctx.textAlign = 'right';
    const label = e.name.length > 16 ? e.name.slice(0,15)+'…' : e.name;
    ctx.fillText(label, pad.left - 10, y + 4);

    // Track bg
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(pad.left, y - 4, trackW, 8);

    // Fill
    const grad = ctx.createLinearGradient(pad.left, 0, pad.left + fillW, 0);
    grad.addColorStop(0, color + '88');
    grad.addColorStop(1, color);
    ctx.fillStyle = grad;
    ctx.fillRect(pad.left, y - 4, fillW, 8);

    // Dot at end
    ctx.beginPath();
    ctx.arc(pad.left + fillW, y, 6, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(pad.left + fillW, y, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#111';
    ctx.fill();

    // % label
    ctx.fillStyle = color;
    ctx.font = 'bold 10px Space Mono';
    ctx.textAlign = 'left';
    ctx.fillText(e.wr + '%', W - pad.right + 8, y + 4);

    // Count
    ctx.fillStyle = '#444';
    ctx.font = '9px Space Mono';
    ctx.fillText('(' + e.total + ')', W - pad.right + 8, y + 15);
  });
}

function renderMonthly(trades) {
  const el = document.getElementById('monthly-table');
  if (!el) return;

  const monthly = {};
  trades.forEach(t => {
    if (!t.date) return;
    const key = t.date.slice(0, 7); // YYYY-MM
    if (!monthly[key]) monthly[key] = { pnl: 0, wins: 0, losses: 0, count: 0 };
    monthly[key].pnl += t.pnl;
    monthly[key].count++;
    if (t.status === 'Closed - Win') monthly[key].wins++;
    else if (t.status === 'Closed - Loss') monthly[key].losses++;
  });

  const rows = Object.entries(monthly).sort((a,b) => b[0].localeCompare(a[0]));
  if (!rows.length) { el.innerHTML = '<div style="font-family:var(--mono);font-size:11px;color:var(--text3);padding:1rem;">No data</div>'; return; }

  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  el.innerHTML = `<table style="width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;">
    <thead>
      <tr style="border-bottom:1px solid var(--border2);">
        <th style="text-align:left;padding:6px 8px;color:var(--text3);letter-spacing:0.1em;font-weight:400;">MONTH</th>
        <th style="text-align:right;padding:6px 8px;color:var(--text3);letter-spacing:0.1em;font-weight:400;">TRADES</th>
        <th style="text-align:right;padding:6px 8px;color:var(--text3);letter-spacing:0.1em;font-weight:400;">W/L</th>
        <th style="text-align:right;padding:6px 8px;color:var(--text3);letter-spacing:0.1em;font-weight:400;">WIN %</th>
        <th style="text-align:right;padding:6px 8px;color:var(--text3);letter-spacing:0.1em;font-weight:400;">P&L</th>
      </tr>
    </thead>
    <tbody>
      ${rows.map(([key, d]) => {
        const [yr, mo] = key.split('-');
        const wr = Math.round((d.wins / d.count) * 100);
        const pnlStr = (d.pnl >= 0 ? '+' : '-') + '$' + Math.abs(d.pnl).toLocaleString();
        const pnlColor = d.pnl >= 0 ? '#00e676' : '#ff4444';
        return `<tr style="border-bottom:1px solid var(--border);">
          <td style="padding:8px;color:var(--text);">${MONTHS[parseInt(mo)-1]} ${yr}</td>
          <td style="padding:8px;text-align:right;color:var(--text2);">${d.count}</td>
          <td style="padding:8px;text-align:right;color:var(--text2);">${d.wins}W / ${d.losses}L</td>
          <td style="padding:8px;text-align:right;color:${wr >= 60 ? '#00e676' : wr >= 40 ? '#ffd740' : '#ff4444'};">${wr}%</td>
          <td style="padding:8px;text-align:right;font-weight:700;color:${pnlColor};">${pnlStr}</td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;
}

let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar(allTrades);
}

function renderCalendar(trades) {
  // Insert calendar after monthly-panel if not already there
  const monthly = document.getElementById('monthly-panel');
  if (monthly && !document.getElementById('cal-panel-inner')) {
    const calDiv = document.createElement('div');
    calDiv.id = 'cal-panel-inner';
    calDiv.className = 'cal-panel';
    calDiv.style.cssText = 'margin-top:1px;border:none;';
    calDiv.innerHTML = `
      <div class="cal-header">
        <div class="chart-panel-title" style="margin:0;">Daily P&L Calendar</div>
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="changeMonth(-1)">&#8592;</button>
          <div class="cal-month-label" id="cal-month-label-inner"></div>
          <button class="cal-nav-btn" onclick="changeMonth(1)">&#8594;</button>
        </div>
      </div>
      <div class="cal-grid" id="cal-grid-inner"></div>`;
    monthly.insertAdjacentElement('afterend', calDiv);
  }
  // Use inner elements if available
  const monthLabelEl = document.getElementById('cal-month-label-inner') || document.getElementById('cal-month-label');
  const gridEl = document.getElementById('cal-grid-inner') || document.getElementById('cal-grid');
  if (!monthLabelEl || !gridEl) return;
  _renderCalendarInto(trades, monthLabelEl, gridEl);
}
function _renderCalendarInto(trades, monthLabelEl, gridEl) {
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  monthLabelEl.textContent = `${MONTHS[calMonth]} ${calYear}`;

  // Build daily P&L map
  const dailyMap = {};
  trades.forEach(t => {
    if (!t.date) return;
    if (!dailyMap[t.date]) dailyMap[t.date] = { pnl: 0, count: 0 };
    dailyMap[t.date].pnl += t.pnl;
    dailyMap[t.date].count++;
  });

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const today = new Date();

  let html = DAYS.map(d => `<div class="cal-day-header">${d}</div>`).join('');

  // Empty cells before first day
  for (let i = 0; i < firstDay; i++) {
    html += `<div class="cal-cell empty"></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = today.getFullYear() === calYear && today.getMonth() === calMonth && today.getDate() === d;
    const data = dailyMap[dateStr];

    let cellClass = 'cal-cell';
    if (isToday) cellClass += ' today';
    if (data) cellClass += ' has-trades';

    let inner = `<div class="cal-date">${d}</div>`;
    if (data) {
      const pnlClass = data.pnl >= 0 ? 'pos' : 'neg';
      const pnlStr = (data.pnl >= 0 ? '+' : '-') + '$' + Math.abs(data.pnl).toLocaleString();
      inner += `<div class="cal-trades">${data.count} trade${data.count > 1 ? 's' : ''}</div>`;
      inner += `<div class="cal-pnl ${pnlClass}">${pnlStr}</div>`;
    }

    html += `<div class="${cellClass}">${inner}</div>`;
  }

  gridEl.innerHTML = html;
}
