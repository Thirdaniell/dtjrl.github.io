<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics — FTJ</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="https://i.imgur.com/ZP2pTk2.png">

<link rel="stylesheet" href="mobile.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="nav.js"></script>

<style>
:root{
  --bg:#0a0a0a;
  --surface:#111111;
  --surface2:#181818;
  --border:#1a1a1a;
  --border2:#2a2a2a;
  --text:#e8e8e8;
  --text2:#888;
  --text3:#444;
  --green:#00e676;
  --red:#ff4444;
  --accent:#c8ff00;
  --mono:'Space Mono', monospace;
  --sans:'DM Sans', sans-serif;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html,
body{
  width:100%;
  overflow-x:hidden;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  font-size:14px;
  min-height:100vh;
}

.page{
  width:100%;
  max-width:1200px;
  margin:0 auto;
  padding:clamp(1rem, 3vw, 3rem);
}

.page-header{
  margin-bottom:2.5rem;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:1rem;
  flex-wrap:wrap;
}

.page-eyebrow{
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:0.2em;
  color:var(--accent);
  text-transform:uppercase;
  margin-bottom:10px;
}

.page-title{
  font-family:var(--mono);
  font-size:28px;
  font-weight:700;
  color:var(--text);
  line-height:1.1;
}

.period-tabs{
  display:flex;
  gap:1px;
  background:var(--border);
  overflow-x:auto;
  max-width:100%;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}

.period-tabs::-webkit-scrollbar{
  display:none;
}

.period-tab{
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  padding:8px 16px;
  background:var(--surface);
  color:var(--text3);
  cursor:pointer;
  border:none;
  transition:all .15s;
  flex-shrink:0;
}

.period-tab:hover{
  color:var(--text2);
}

.period-tab.active{
  background:var(--surface2);
  color:var(--accent);
}

.stats-row{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
  gap:1px;
  background:var(--border);
  border:1px solid var(--border);
  margin-bottom:2rem;
}

.stat{
  background:var(--surface);
  padding:1.25rem 1.5rem;
  min-width:0;
}

.stat-label{
  font-family:var(--mono);
  font-size:9px;
  letter-spacing:.12em;
  color:var(--text3);
  text-transform:uppercase;
  margin-bottom:8px;
}

.stat-value{
  font-family:var(--mono);
  font-size:18px;
  font-weight:700;
  color:var(--text);
  line-height:1.2;
  word-break:break-word;
}

.stat-sub{
  font-family:var(--mono);
  font-size:9px;
  color:var(--text3);
  margin-top:3px;
  letter-spacing:.08em;
}

.stat-value.pos{
  color:var(--green);
}

.stat-value.neg{
  color:var(--red);
}

.charts-grid{
  display:grid;
  grid-template-columns:minmax(0,1fr) 340px;
  gap:1px;
  background:var(--border);
  margin-bottom:1px;
}

.dual-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1px;
  background:var(--border);
  margin-top:1px;
}

.chart-panel{
  background:var(--surface);
  padding:1.5rem;
  min-width:0;
  overflow:hidden;
}

.chart-panel-title{
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:.15em;
  color:var(--text3);
  text-transform:uppercase;
  margin-bottom:1.25rem;
}

canvas{
  display:block;
  width:100% !important;
  height:100% !important;
}

.loading-state{
  text-align:center;
  padding:5rem 2rem;
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:.12em;
  color:var(--text3);
  text-transform:uppercase;
}

.loading-state span{
  animation:blink 1s infinite;
  display:inline-block;
}

@keyframes blink{
  0%,100%{opacity:1}
  50%{opacity:.2}
}

.error-state{
  padding:2rem;
  font-family:var(--mono);
  font-size:11px;
  color:var(--red);
  background:rgba(255,68,68,.05);
  border:1px solid rgba(255,68,68,.2);
}
.cal-panel{
  background:var(--surface);
  padding:1.5rem;
  margin-bottom:2rem;
  border:1px solid var(--border);

  overflow:hidden;
}

.cal-header{
  display:flex;
  align-items:center;
  justify-content:space-between;

  gap:1rem;

  margin-bottom:1.25rem;
}

.cal-nav{
  display:flex;
  align-items:center;
  gap:12px;

  flex-shrink:0;
}

.cal-nav-btn{
  font-family:var(--mono);
  font-size:14px;

  background:none;

  border:1px solid var(--border2);

  color:var(--text2);

  width:28px;
  height:28px;

  cursor:pointer;

  transition:all .15s;

  display:flex;
  align-items:center;
  justify-content:center;
}

.cal-nav-btn:hover{
  color:var(--accent);
  border-color:var(--accent);
}

.cal-month-label{
  font-family:var(--mono);
  font-size:12px;
  letter-spacing:.1em;

  color:var(--text);

  text-transform:uppercase;

  min-width:140px;

  text-align:center;
}

/* WRAPPER */

.cal-grid{
  display:grid;

  grid-template-columns:repeat(7,minmax(0,1fr));

  gap:1px;

  background:var(--border);

  width:100%;
}

/* DAY HEADER */

.cal-day-header{
  background:var(--bg);

  font-family:var(--mono);
  font-size:9px;

  letter-spacing:.1em;

  color:var(--text3);

  text-transform:uppercase;

  text-align:center;

  padding:8px 0;

  overflow:hidden;
}

/* CELLS */

.cal-cell{
  background:var(--surface);

  min-height:78px;

  padding:6px;

  display:flex;
  flex-direction:column;

  gap:3px;

  overflow:hidden;
}

.cal-cell.empty{
  background:var(--bg);
}

.cal-cell.today{
  background:var(--surface2);
  outline:1px solid var(--border2);
}

.cal-cell.has-trades{
  background:var(--surface2);
}

.cal-date{
  font-family:var(--mono);
  font-size:10px;

  color:var(--text3);
}

.cal-trades{
  font-family:var(--mono);
  font-size:9px;

  color:var(--text3);

  line-height:1.2;
}

.cal-pnl{
  font-family:var(--mono);
  font-size:11px;
  font-weight:700;

  margin-top:auto;

  line-height:1.1;

  word-break:break-word;
}

.cal-pnl.pos{
  color:var(--green);
}

.cal-pnl.neg{
  color:var(--red);
}

/* TABLET */

@media (max-width:900px){

  .cal-cell{
    min-height:64px;
    padding:5px;
  }

  .cal-pnl{
    font-size:10px;
  }
}

/* MOBILE */

@media (max-width:600px){

  .cal-panel{
    padding:1rem;
  }

  .cal-header{
    flex-direction:column;
    align-items:flex-start;
  }

  .cal-nav{
    width:100%;
    justify-content:space-between;
  }

  .cal-month-label{
    min-width:auto;
    flex:1;
  }

  .cal-grid{
    min-width:560px;
  }

  .cal-cell{
    min-height:54px;

    padding:4px;
  }

  .cal-date{
    font-size:8px;
  }

  .cal-trades{
    display:none;
  }

  .cal-pnl{
    font-size:9px;
  }

  .cal-panel{
    overflow-x:auto;
  }
}
::-webkit-scrollbar{
  width:4px;
  height:4px;
}

::-webkit-scrollbar-track{
  background:var(--bg);
}

::-webkit-scrollbar-thumb{
  background:var(--border2);
  border-radius:2px;
}

::-webkit-scrollbar-thumb:hover{
  background:var(--accent);
}

@media (max-width:900px){

  .charts-grid{
    grid-template-columns:1fr;
  }

  .dual-grid{
    grid-template-columns:1fr;
  }
}

@media (max-width:768px){

  .page-header{
    flex-direction:column;
    align-items:flex-start;
  }

  .chart-panel{
    padding:1rem;
  }

  .stat{
    padding:1rem;
  }

  .cal-cell{
    min-height:55px;
  }

  .cal-pnl{
    font-size:10px;
  }

  .cal-date{
    font-size:8px;
  }

  .cal-trades{
    display:none;
  }
}

@media (max-width:480px){

  .page-title{
    font-size:22px;
  }

  .stat-value{
    font-size:15px;
  }

  .chart-panel{
    padding:.9rem;
  }
}
</style>
</head>

<body>

<div class="page">

  <div class="page-header">
    <div>
      <div class="page-eyebrow">// Performance</div>
      <div class="page-title">Analytics</div>
    </div>

    <div class="period-tabs">
      <button class="period-tab active" data-period="all">All</button>
      <button class="period-tab" data-period="week">Week</button>
      <button class="period-tab" data-period="month">Month</button>
      <button class="period-tab" data-period="3month">3M</button>
    </div>
  </div>

  <div id="stats-row" class="stats-row">

    <div class="stat">
      <div class="stat-label">Trades</div>
      <div class="stat-value" id="s-total">—</div>
    </div>

    <div class="stat">
      <div class="stat-label">Win Rate</div>
      <div class="stat-value" id="s-wr">—</div>
    </div>

    <div class="stat">
      <div class="stat-label">Total P&L</div>
      <div class="stat-value" id="s-pnl">—</div>
    </div>

    <div class="stat">
      <div class="stat-label">Avg P&L</div>
      <div class="stat-value" id="s-avg">—</div>
    </div>

    <div class="stat">
      <div class="stat-label">Best Trade</div>
      <div class="stat-value pos" id="s-best">—</div>
    </div>

    <div class="stat">
      <div class="stat-label">Streak</div>
      <div class="stat-value" id="s-streak">—</div>
      <div class="stat-sub" id="s-streak-sub"></div>
    </div>

    <div class="stat">
      <div class="stat-label">Best Session</div>
      <div class="stat-value" id="s-session">—</div>
    </div>

    <div class="stat">
      <div class="stat-label">Avg R:R</div>
      <div class="stat-value" id="s-rr">—</div>
      <div class="stat-sub">risk to reward</div>
    </div>

    <div class="stat">
      <div class="stat-label">Avg Duration</div>
      <div class="stat-value" id="s-dur">—</div>
      <div class="stat-sub">time in trade</div>
    </div>

  </div>

  <div id="main-content">
    <div class="loading-state">
      Loading analytics <span>...</span>
    </div>
  </div>

</div>

<script>
const WORKER_URL = "https://trade-journal-proxy.daniel-mouldd.workers.dev";
const DATABASE_ID = "5398f956345943b7b12b2298bbb6e127";

const INSTRUMENT_COLORS = {
  'NQ': '#c8ff00', 'ES': '#00e676', 'MNQ': '#40c4ff',
  'MES': '#ff6d00', 'CL': '#ea80fc', 'GC': '#ffd740',
  'RTY': '#ff4444', 'Other': '#888'
};

let allTrades = [];
let equityChartInst = null;
let donutChartInst = null;
let gradeChartInst = null;

function destroyChart(inst) { try { if (inst) inst.destroy(); } catch(e) {} }

// Chart.js global defaults — dark theme
Chart.defaults.color = '#888';
Chart.defaults.borderColor = '#2a2a2a';
Chart.defaults.font.family = 'Space Mono, monospace';
Chart.defaults.font.size = 11;
let currentPeriod = 'all';
let equityChart = null;
let donutChart = null;

async function fetchTrades() {
  try {
    let pages = [], cursor = null;
    do {
      const body = { page_size: 100 };
      if (cursor) body.start_cursor = cursor;
      const res = await fetch(`${WORKER_URL}/notion/databases/${DATABASE_ID}/query`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error(`Worker error: ${res.status}`);
      const data = await res.json();
      pages = pages.concat(data.results || []);
      cursor = data.has_more ? data.next_cursor : null;
    } while (cursor);

    allTrades = pages.map(page => {
      const p = page.properties;
      return {
        instrument: p['Instrument']?.select?.name || 'Other',
        pnl: p['P&L ($)']?.number || 0,
        status: p['Status']?.select?.name || '',
        date: p['Date']?.date?.start || '',
        session: p['Session']?.select?.name || '',
        grade: p['Setup Grade']?.select?.name || '',
        direction: p['Direction']?.select?.name || '',
        timeframe: p['Timeframe']?.select?.name || '',
        confluences: p['Confluences']?.multi_select?.map(o => o.name) || [],
        rrStored: p['R:R']?.number,
        durationStored: p['Duration (mins)']?.number,
        entryPrice: p['Entry Price']?.number,
        exitPrice: p['Exit Price']?.number,
        stopLoss: p['Stop Loss']?.number,
        takeProfit: p['Take Profit']?.number,
        entryTime: (p['Entry Time']?.rich_text||[]).map(r=>r.plain_text).join(''),
        exitTime: (p['Exit Time']?.rich_text||[]).map(r=>r.plain_text).join(''),
      };
    }).map(t => {
      // Auto-calculate R:R from entry/SL/TP if not stored
      if (t.rrStored != null) {
        t.rr = t.rrStored;
      } else if (t.entryPrice != null && t.stopLoss != null && t.takeProfit != null) {
        const risk = Math.abs(t.entryPrice - t.stopLoss);
        const reward = Math.abs(t.takeProfit - t.entryPrice);
        t.rr = risk > 0 ? Math.round((reward / risk) * 100) / 100 : null;
      } else {
        t.rr = null;
      }
      // Auto-calculate duration from entry/exit time if not stored
      if (t.durationStored != null) {
        t.duration = t.durationStored;
      } else if (t.entryTime && t.exitTime) {
        const parseTime = s => {
          const m = s.match(/(\d{1,2}):(\d{2})\s*(AM|PM)?/i);
          if (!m) return null;
          let h = parseInt(m[1]), min = parseInt(m[2]);
          const ap = (m[3]||'').toUpperCase();
          if (ap === 'PM' && h < 12) h += 12;
          if (ap === 'AM' && h === 12) h = 0;
          return h * 60 + min;
        };
        const eMin = parseTime(t.entryTime), xMin = parseTime(t.exitTime);
        t.duration = (eMin != null && xMin != null && xMin > eMin) ? xMin - eMin : null;
      } else {
        t.duration = null;
      }
      return t;
    }).filter(t => t.date).sort((a,b) => a.date.localeCompare(b.date));

    renderAll();
  } catch(e) {
    document.getElementById('main-content').innerHTML = `<div class="error-state">Error: ${e.message}</div>`;
  }
}

function filterByPeriod(trades, period) {
  if (period === 'all') return trades;
  const now = new Date();
  const cutoff = new Date();
  if (period === 'week') cutoff.setDate(now.getDate() - 7);
  else if (period === 'month') cutoff.setMonth(now.getMonth() - 1);
  else if (period === '3month') cutoff.setMonth(now.getMonth() - 3);
  return trades.filter(t => new Date(t.date) >= cutoff);
}

function setText(id, text, cls) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  if (cls) el.className = cls;
}

function updateStats(trades) {
  const total = trades.length;
  const wins = trades.filter(t => t.status === 'Closed - Win').length;
  const losses = trades.filter(t => t.status === 'Closed - Loss').length;
  const pnl = trades.reduce((s,t) => s + t.pnl, 0);
  const avg = total ? Math.round(pnl / total) : 0;
  const best = total ? Math.max(...trades.map(t => t.pnl)) : 0;

  // Streaks
  let curWin=0,curLoss=0,maxWin=0,maxLoss=0;
  const sorted = [...trades].sort((a,b)=>a.date.localeCompare(b.date));
  sorted.forEach(t => {
    if (t.status === 'Closed - Win') { curWin++; maxWin=Math.max(maxWin,curWin); curLoss=0; }
    else if (t.status === 'Closed - Loss') { curLoss++; maxLoss=Math.max(maxLoss,curLoss); curWin=0; }
  });

  // Best session
  const sessionMap = {};
  trades.forEach(t => {
    if (!t.session) return;
    if (!sessionMap[t.session]) sessionMap[t.session] = { pnl:0, count:0 };
    sessionMap[t.session].pnl += t.pnl;
    sessionMap[t.session].count++;
  });
  const bestSession = Object.entries(sessionMap).sort((a,b)=>b[1].pnl-a[1].pnl)[0];

  setText('s-total', total);
  setText('s-wr', total ? Math.round((wins/total)*100)+'%' : '—');
  setText('s-pnl', total ? (pnl>=0?'+':'-')+'$'+Math.abs(pnl).toLocaleString() : '—', 'stat-value'+(pnl>0?' pos':pnl<0?' neg':''));
  setText('s-avg', total ? (avg>=0?'+':'-')+'$'+Math.abs(avg).toLocaleString() : '—', 'stat-value'+(avg>0?' pos':avg<0?' neg':''));
  setText('s-best', best ? '+$'+best.toLocaleString() : '—');
  // Combined streak - show current streak direction
  const streakEl = document.getElementById('s-streak');
  const streakSubEl = document.getElementById('s-streak-sub');
  if (streakEl) {
    if (sorted.length === 0) { streakEl.textContent = '—'; streakEl.className = 'stat-value'; }
    else {
      const lastStatus = sorted[sorted.length-1].status;
      const isWinStreak = lastStatus === 'Closed - Win';
      let currentStreak = 0;
      for (let i = sorted.length-1; i >= 0; i--) {
        const s = sorted[i].status === 'Closed - Win' ? 'W' : 'L';
        const expected = isWinStreak ? 'W' : 'L';
        if (s === expected) currentStreak++;
        else break;
      }
      streakEl.textContent = currentStreak + (isWinStreak ? 'W' : 'L');
      streakEl.className = 'stat-value ' + (isWinStreak ? 'pos' : 'neg');
      if (streakSubEl) streakSubEl.textContent = 'best: ' + (isWinStreak ? maxWin : maxLoss);
    }
  }
  setText('s-session', bestSession ? bestSession[0] : '—');

  document.getElementById('s-best').textContent = best ? '+$' + best.toLocaleString() : '—';

  const rrs = trades.filter(t => t.rr != null).map(t => t.rr);
  const avgRR = rrs.length ? (rrs.reduce((a,b)=>a+b,0)/rrs.length).toFixed(2) : null;
  setText('s-rr', avgRR ? '1:' + avgRR : '—');

  const durs = trades.filter(t => t.duration != null).map(t => t.duration);
  const avgDur = durs.length ? Math.round(durs.reduce((a,b)=>a+b,0)/durs.length) : null;
  setText('s-dur', avgDur ? (avgDur < 60 ? avgDur + 'm' : Math.floor(avgDur/60) + 'h ' + (avgDur%60) + 'm') : '—');

  // Update stat font size for long values
  ['s-rr','s-dur','s-wstreak','s-lstreak'].forEach(id => {
    const el = document.getElementById(id);
    if (el && el.textContent.length > 5) el.style.fontSize = '14px';
    else if (el) el.style.fontSize = '';
  });


}

function renderEquityChart(trades) {
  const canvas = document.getElementById('equity-canvas');
  if (!canvas) return;
  destroyChart(equityChartInst);

  if (!trades.length) return;

  let cumulative = 0;
  const sorted = [...trades].sort((a,b) => a.date.localeCompare(b.date));
  const labels = ['Start'];
  const data = [0];
  sorted.forEach(t => {
    cumulative += t.pnl;
    labels.push(t.date.slice(5));
    data.push(cumulative);
  });

  const isPositive = cumulative >= 0;
  const lineColor = isPositive ? '#00e676' : '#ff4444';

  equityChartInst = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Equity',
        data,
        borderColor: lineColor,
        borderWidth: 2,
        pointBackgroundColor: lineColor,
        pointRadius: 4,
        pointHoverRadius: 6,
        fill: true,
        backgroundColor: (ctx) => {
          const gradient = ctx.chart.ctx.createLinearGradient(0, 0, 0, ctx.chart.height);
          gradient.addColorStop(0, isPositive ? 'rgba(0,230,118,0.25)' : 'rgba(255,68,68,0.25)');
          gradient.addColorStop(1, 'rgba(0,0,0,0)');
          return gradient;
        },
        tension: 0.3,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#181818',
          borderColor: '#2a2a2a',
          borderWidth: 1,
          titleColor: '#888',
          bodyColor: '#e8e8e8',
          callbacks: {
            label: ctx => (ctx.raw >= 0 ? '+' : '') + '$' + ctx.raw.toLocaleString()
          }
        }
      },
      scales: {
        x: {
          grid: { color: '#1a1a1a' },
          ticks: { color: '#444', maxTicksLimit: 8, font: { size: 10 } }
        },
        y: {
          grid: { color: '#1a1a1a' },
          ticks: {
            color: '#444',
            font: { size: 10 },
            callback: v => (v >= 0 ? '+' : '') + '$' + Math.abs(v).toLocaleString()
          }
        }
      }
    }
  });
}




function renderDonut(trades) {
  const canvas = document.getElementById('donut-canvas');
  if (!canvas) return;
  destroyChart(donutChartInst);

  const counts = {};
  trades.forEach(t => { if (t.instrument) counts[t.instrument] = (counts[t.instrument] || 0) + 1; });
  const entries = Object.entries(counts).sort((a,b) => b[1]-a[1]);
  if (!entries.length) return;

  const COLORS = {'NQ':'#c8ff00','ES':'#00e676','MNQ':'#40c4ff','MES':'#ff6d00','CL':'#ea80fc','GC':'#ffd740','RTY':'#ff4444'};

  donutChartInst = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: entries.map(([inst]) => inst),
      datasets: [{
        data: entries.map(([,c]) => c),
        backgroundColor: entries.map(([inst]) => COLORS[inst] || '#888'),
        borderColor: '#111',
        borderWidth: 3,
        hoverOffset: 8,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '58%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: { color:'#888', font:{ size:11, family:'Space Mono' }, padding:12, boxWidth:12 }
        },
        tooltip: {
          backgroundColor:'#181818', borderColor:'#2a2a2a', borderWidth:1,
          callbacks: {
            label: ctx => ` ${ctx.label}: ${ctx.raw} trade${ctx.raw>1?'s':''} (${Math.round(ctx.parsed/trades.length*100)}%)`
          }
        }
      }
    }
  });
}

function renderGradeDist(trades) {
  const canvas = document.getElementById('grade-canvas');
  if (!canvas) return;
  destroyChart(gradeChartInst);

  const grades = ['A++','A+','A','A-','B+','B','B-','C','D'];
  const colors = {'A++':'#c8ff00','A+':'#00e676','A':'#00c853','A-':'#40c4ff','B+':'#ffd740','B':'#ffab40','B-':'#ff8f00','C':'#ff6d00','D':'#ff4444'};
  const counts = {};
  grades.forEach(g => counts[g] = 0);
  trades.forEach(t => { if (t.grade && counts[t.grade] !== undefined) counts[t.grade]++; });
  const entries = grades.filter(g => counts[g] > 0);
  if (!entries.length) return;

  gradeChartInst = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: entries,
      datasets: [{
        data: entries.map(g => counts[g]),
        backgroundColor: entries.map(g => colors[g]),
        borderColor: '#111',
        borderWidth: 3,
        hoverOffset: 8,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '55%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: { color:'#888', font:{ size:11, family:'Space Mono' }, padding:10, boxWidth:12 }
        },
        tooltip: {
          backgroundColor:'#181818', borderColor:'#2a2a2a', borderWidth:1,
          callbacks: { label: ctx => ` ${ctx.label}: ${ctx.raw} trade${ctx.raw>1?'s':''}` }
        }
      }
    }
  });
}


function renderSessionPnl(trades) {
  const el = document.getElementById('session-cards');
  if (!el) return;

  const sessions = {};
  trades.forEach(t => {
    if (!t.session) return;
    if (!sessions[t.session]) sessions[t.session] = { pnl: 0, wins: 0, total: 0 };
    sessions[t.session].pnl += t.pnl;
    sessions[t.session].total++;
    if (t.status === 'Closed - Win') sessions[t.session].wins++;
  });

  const entries = Object.entries(sessions).sort((a,b) => b[1].pnl - a[1].pnl);

  if (!entries.length) {
    el.innerHTML = '<div style="font-family:var(--mono);font-size:11px;color:var(--text3);padding:1rem;">No data</div>';
    return;
  }

  el.innerHTML = entries.map(([sess, d]) => {
    const isPos = d.pnl >= 0;
    const pnlStr = (isPos ? '+' : '-') + '$' + Math.abs(d.pnl).toLocaleString();
    const wr = Math.round((d.wins / d.total) * 100);
    return `<div style="background:var(--surface);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--text);letter-spacing:0.08em;">${sess}</div>
        <div style="font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:3px;">${d.total} trade${d.total>1?'s':''} · ${wr}% win</div>
      </div>
      <div style="font-family:var(--mono);font-size:20px;font-weight:700;color:${isPos?'#00e676':'#ff4444'};">${pnlStr}</div>
    </div>`;
  }).join('');
}

function renderConfWinRate(trades) {
  const el = document.getElementById('conf-inner');
  if (!el) return;

  const confStats = {};
  trades.forEach(t => {
    (t.confluences || []).forEach(c => {
      if (!confStats[c]) confStats[c] = { wins: 0, total: 0 };
      confStats[c].total++;
      if (t.status === 'Closed - Win') confStats[c].wins++;
    });
  });

  const minUsage = trades.length >= 30 ? 10 : trades.length >= 15 ? 5 : 3;
  const entries = Object.entries(confStats)
    .filter(([,v]) => v.total >= minUsage)
    .map(([name, v]) => ({ name, wr: Math.round((v.wins/v.total)*100), total: v.total }))
    .sort((a,b) => b.wr - a.wr);

  if (!entries.length) {
    el.innerHTML = '<div style="font-family:var(--mono);font-size:11px;color:var(--text3);padding:1rem;">Not enough data — confluence needs to appear ' + minUsage + '+ times.</div>';
    return;
  }

  el.innerHTML = entries.map(e => {
    const color = e.wr >= 70 ? '#00e676' : e.wr >= 50 ? '#ffd740' : '#ff4444';
    return `<div style="display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border);">
      <div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--text2);margin-bottom:4px;">${e.name} <span style="color:var(--text3);">(${e.total}x)</span></div>
        <div style="height:5px;background:var(--border2);border-radius:3px;overflow:hidden;">
          <div style="height:100%;width:${e.wr}%;background:${color};border-radius:3px;transition:width 0.4s;"></div>
        </div>
      </div>
      <div style="font-family:var(--mono);font-size:13px;font-weight:700;color:${color};">${e.wr}%</div>
    </div>`;
  }).join('');
}
function renderMonthly(trades) {
  const el = document.getElementById('monthly-table');
  if (!el) return;

  const monthly = {};
  trades.forEach(t => {
    if (!t.date) return;
    const key = t.date.slice(0, 7); // YYYY-MM
    if (!monthly[key]) monthly[key] = { pnl: 0, wins: 0, losses: 0, count: 0 };
    monthly[key].pnl += t.pnl;
    monthly[key].count++;
    if (t.status === 'Closed - Win') monthly[key].wins++;
    else if (t.status === 'Closed - Loss') monthly[key].losses++;
  });

  const rows = Object.entries(monthly).sort((a,b) => b[0].localeCompare(a[0]));
  if (!rows.length) { el.innerHTML = '<div style="font-family:var(--mono);font-size:11px;color:var(--text3);padding:1rem;">No data</div>'; return; }

  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  el.innerHTML = `<table style="width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;">
    <thead>
      <tr style="border-bottom:1px solid var(--border2);">
        <th style="text-align:left;padding:6px 8px;color:var(--text3);letter-spacing:0.1em;font-weight:400;">MONTH</th>
        <th style="text-align:right;padding:6px 8px;color:var(--text3);letter-spacing:0.1em;font-weight:400;">TRADES</th>
        <th style="text-align:right;padding:6px 8px;color:var(--text3);letter-spacing:0.1em;font-weight:400;">W/L</th>
        <th style="text-align:right;padding:6px 8px;color:var(--text3);letter-spacing:0.1em;font-weight:400;">WIN %</th>
        <th style="text-align:right;padding:6px 8px;color:var(--text3);letter-spacing:0.1em;font-weight:400;">P&L</th>
      </tr>
    </thead>
    <tbody>
      ${rows.map(([key, d]) => {
        const [yr, mo] = key.split('-');
        const wr = Math.round((d.wins / d.count) * 100);
        const pnlStr = (d.pnl >= 0 ? '+' : '-') + '$' + Math.abs(d.pnl).toLocaleString();
        const pnlColor = d.pnl >= 0 ? '#00e676' : '#ff4444';
        return `<tr style="border-bottom:1px solid var(--border);">
          <td style="padding:8px;color:var(--text);">${MONTHS[parseInt(mo)-1]} ${yr}</td>
          <td style="padding:8px;text-align:right;color:var(--text2);">${d.count}</td>
          <td style="padding:8px;text-align:right;color:var(--text2);">${d.wins}W / ${d.losses}L</td>
          <td style="padding:8px;text-align:right;color:${wr >= 60 ? '#00e676' : wr >= 40 ? '#ffd740' : '#ff4444'};">${wr}%</td>
          <td style="padding:8px;text-align:right;font-weight:700;color:${pnlColor};">${pnlStr}</td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;
}

let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar(allTrades);
}

function renderCalendar(trades) {
  // Insert calendar after monthly-panel if not already there
  const monthly = document.getElementById('monthly-panel');
  if (monthly && !document.getElementById('cal-panel-inner')) {
    const calDiv = document.createElement('div');
    calDiv.id = 'cal-panel-inner';
    calDiv.className = 'cal-panel';
    calDiv.style.cssText = 'margin-top:1px;border:none;';
    calDiv.innerHTML = `
      <div class="cal-header">
        <div class="chart-panel-title" style="margin:0;">Daily P&L Calendar</div>
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="changeMonth(-1)">&#8592;</button>
          <div class="cal-month-label" id="cal-month-label-inner"></div>
          <button class="cal-nav-btn" onclick="changeMonth(1)">&#8594;</button>
        </div>
      </div>
      <div class="cal-grid" id="cal-grid-inner"></div>`;
    monthly.insertAdjacentElement('afterend', calDiv);
  }
  // Use inner elements if available
  const monthLabelEl = document.getElementById('cal-month-label-inner') || document.getElementById('cal-month-label');
  const gridEl = document.getElementById('cal-grid-inner') || document.getElementById('cal-grid');
  if (!monthLabelEl || !gridEl) return;
  _renderCalendarInto(trades, monthLabelEl, gridEl);
}
function _renderCalendarInto(trades, monthLabelEl, gridEl) {
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  monthLabelEl.textContent = `${MONTHS[calMonth]} ${calYear}`;

  // Build daily P&L map
  const dailyMap = {};
  trades.forEach(t => {
    if (!t.date) return;
    if (!dailyMap[t.date]) dailyMap[t.date] = { pnl: 0, count: 0 };
    dailyMap[t.date].pnl += t.pnl;
    dailyMap[t.date].count++;
  });

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const today = new Date();

  let html = DAYS.map(d => `<div class="cal-day-header">${d}</div>`).join('');

  // Empty cells before first day
  for (let i = 0; i < firstDay; i++) {
    html += `<div class="cal-cell empty"></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = today.getFullYear() === calYear && today.getMonth() === calMonth && today.getDate() === d;
    const data = dailyMap[dateStr];

    let cellClass = 'cal-cell';
    if (isToday) cellClass += ' today';
    if (data) cellClass += ' has-trades';

    let inner = `<div class="cal-date">${d}</div>`;
    if (data) {
      const pnlClass = data.pnl >= 0 ? 'pos' : 'neg';
      const pnlStr = (data.pnl >= 0 ? '+' : '-') + '$' + Math.abs(data.pnl).toLocaleString();
      inner += `<div class="cal-trades">${data.count} trade${data.count > 1 ? 's' : ''}</div>`;
      inner += `<div class="cal-pnl ${pnlClass}">${pnlStr}</div>`;
    }

    html += `<div class="${cellClass}">${inner}</div>`;
  }

  gridEl.innerHTML = html;
}

function renderAll() {
  const filtered = filterByPeriod(allTrades, currentPeriod);
  updateStats(filtered);

  document.getElementById('main-content').innerHTML = `
    <div class="charts-grid">
      <div class="chart-panel">
        <div class="chart-panel-title">Equity Curve</div>
        <div style="position:relative;height:280px;">
          <canvas id="equity-canvas"></canvas>
        </div>
      </div>
      <div class="chart-panel">
        <div class="chart-panel-title">Instruments Traded</div>
        <div style="position:relative;height:260px;"><canvas id="donut-canvas"></canvas></div>
      </div>
    </div>
    <div id="monthly-panel" class="chart-panel" style="margin-top:1px;">
      <div class="chart-panel-title">Monthly P&L Summary</div>
      <div id="monthly-table" style="overflow-x:auto;"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);margin-top:1px;">
      <div class="chart-panel">
        <div class="chart-panel-title">Grade Distribution</div>
        <div style="position:relative;height:260px;">
          <div style="position:relative;height:260px;"><canvas id="grade-canvas"></canvas></div>
        </div>
      </div>
      <div class="chart-panel">
        <div class="chart-panel-title">P&L by Session</div>
        <div id="session-cards" style="display:flex;flex-direction:column;gap:1px;background:var(--border);margin-top:4px;"></div>
      </div>
    </div>
    <div class="chart-panel" style="margin-top:1px;">
      <div class="chart-panel-title">Confluence Win Rate</div>

  `;

  requestAnimationFrame(() => {

}

document.querySelectorAll('.period-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentPeriod = tab.dataset.period;
    renderAll();
  });
});

document.addEventListener('DOMContentLoaded', () => initNav('analytics'));
fetchTrades();
</script>
