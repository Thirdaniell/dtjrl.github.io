<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Futures Trade Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #181818;
    --border: #222222;
    --border2: #2a2a2a;
    --text: #e8e8e8;
    --text2: #888;
    --text3: #444;
    --green: #00e676;
    --green-dim: rgba(0,230,118,0.08);
    --red: #ff4444;
    --red-dim: rgba(255,68,68,0.08);
    --accent: #c8ff00;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    transition: background 0.2s, color 0.2s;
  }


  header {
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .refresh-btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--text2);
    background: none;
    border: 1px solid var(--border2);
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .refresh-btn:hover { color: var(--accent); border-color: var(--accent); }

  .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 2rem;
  }

  .stat {
    background: var(--surface);
    padding: 1.25rem 1.5rem;
  }

  .stat-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }

  .stat-value.pos { color: var(--green); }
  .stat-value.neg { color: var(--red); }

  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 1.5rem;
  }

  .filters input, .filters select {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.15s;
    min-width: 140px;
    flex: 1;
    appearance: none;
  }

  .filters input::placeholder { color: var(--text3); }
  .filters input:focus, .filters select:focus { border-color: var(--accent); }
  .filters select option { background: var(--surface); }

  .results-count {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1px;
    background: var(--border);
  }

  .card {
    background: var(--surface);
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: background 0.15s;
  }
  .card:hover { background: var(--surface2); }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }

  .card-instrument {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .card-dir {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .card-dir.long { color: var(--green); }
  .card-dir.short { color: var(--red); }

  .card-badges { display: flex; gap: 6px; flex-wrap: wrap; }

  .badge {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 3px 8px;
    text-transform: uppercase;
    border: 1px solid;
  }
  .badge-win { color: var(--green); border-color: rgba(0,230,118,0.3); background: var(--green-dim); }
  .badge-loss { color: var(--red); border-color: rgba(255,68,68,0.3); background: var(--red-dim); }
  .badge-be { color: var(--text2); border-color: var(--border2); }

  .card-pnl {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 700;
  }
  .card-pnl.pos { color: var(--green); }
  .card-pnl.neg { color: var(--red); }

  .divider { height: 1px; background: var(--border); }

  .card-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 16px;
  }

  .field-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .field-value {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
  }

  .confs {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .conf-tag {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.06em;
    padding: 3px 7px;
    border: 1px solid var(--border2);
    color: var(--text3);
    text-transform: uppercase;
  }

  .chart-img {
    width: 100%;
    border: 1px solid var(--border2);
    display: block;
    object-fit: cover;
  }

  .chart-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border: 1px solid var(--border2);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--text2);
    text-decoration: none;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .chart-link:hover { border-color: var(--accent); color: var(--accent); }
  .chart-link-arrow { font-size: 14px; }

  .no-chart {
    width: 100%;
    padding: 1.5rem;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text3);
    text-transform: uppercase;
  }

  .notes-block { display: flex; flex-direction: column; gap: 8px; }

  .note-item .field-value {
    font-family: var(--sans);
    font-size: 12px;
    color: var(--text2);
    line-height: 1.5;
  }

  .empty-state, .loading-state {
    text-align: center;
    padding: 5rem 2rem;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text3);
    text-transform: uppercase;
    background: var(--surface);
  }

  .loading-state span { animation: blink 1s infinite; display: inline-block; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  .error-state {
    padding: 2rem;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--red);
    background: var(--red-dim);
    border: 1px solid rgba(255,68,68,0.2);
    line-height: 1.8;
  }

  .conf-filter-wrap { position: relative; flex: 1; min-width: 200px; }
  .conf-filter-btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text2);
    padding: 8px 12px;
    width: 100%;
    text-align: left;
    cursor: pointer;
    height: 34px;
    transition: border-color 0.15s;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .conf-filter-btn:focus, .conf-filter-btn.open { border-color: var(--accent); color: var(--text); }
  .conf-filter-btn .arrow { font-size: 10px; transition: transform 0.15s; }
  .conf-filter-btn.open .arrow { transform: rotate(180deg); }
  .conf-dropdown {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-top: none;
    z-index: 999;
    max-height: 280px;
    overflow-y: auto;
  }
  .conf-dropdown.open { display: block; }
  .conf-group-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--text3);
    text-transform: uppercase;
    padding: 8px 10px 4px;
    border-top: 1px solid var(--border2);
  }
  .conf-group-label:first-child { border-top: none; }
  .conf-option {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    cursor: pointer;
    transition: background 0.1s;
    font-size: 12px;
    color: var(--text2);
  }
  .conf-option:hover { background: var(--surface2); }
  .conf-option input[type=checkbox] { accent-color: var(--accent); width: 12px; height: 12px; flex-shrink: 0; }
  .conf-option.checked { color: var(--text); }
  .conf-clear-btn {
    width: 100%;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--text3);
    background: none;
    border: none;
    border-top: 1px solid var(--border2);
    padding: 8px;
    cursor: pointer;
    text-transform: uppercase;
    transition: color 0.15s;
  }
  .conf-clear-btn:hover { color: var(--accent); }

  .conf-filter-wrap { position: relative; flex: 1; min-width: 180px; }
  .conf-filter-btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 8px 12px;
    width: 100%;
    text-align: left;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: border-color 0.15s;
    height: 34px;
  }
  .conf-filter-btn:focus, .conf-filter-btn.open { border-color: var(--accent); color: var(--accent); }
  .conf-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    width: 320px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    z-index: 200;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
  }
  .conf-dropdown.open { display: block; }
  .conf-dropdown-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid var(--border2); }
  .conf-dropdown-title { font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; color: var(--text3); text-transform: uppercase; }
  .conf-clear-btn { font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em; color: var(--accent); background: none; border: none; cursor: pointer; text-transform: uppercase; }
  .conf-options { display: flex; flex-wrap: wrap; gap: 4px; padding: 10px; max-height: 240px; overflow-y: auto; }
  .conf-option {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.06em;
    padding: 4px 9px;
    border: 1px solid var(--border2);
    color: var(--text3);
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.1s;
    user-select: none;
  }
  .conf-option:hover { color: var(--text2); border-color: var(--text3); }
  .conf-option.selected { color: var(--accent); border-color: var(--accent); background: rgba(200,255,0,0.07); }

  .card-meta-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .grade-badge {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 3px 8px;
    border: 1px solid;
    text-transform: uppercase;
  }
  .grade-app { color: #c8ff00; border-color: rgba(200,255,0,0.4); background: rgba(200,255,0,0.07); }
  .grade-ap  { color: #00e676; border-color: rgba(0,230,118,0.4); background: rgba(0,230,118,0.07); }
  .grade-a   { color: #40c4ff; border-color: rgba(64,196,255,0.4); background: rgba(64,196,255,0.07); }
  .grade-b   { color: #ffd740; border-color: rgba(255,215,64,0.4); background: rgba(255,215,64,0.07); }
  .grade-c   { color: #ff6d00; border-color: rgba(255,109,0,0.4); background: rgba(255,109,0,0.07); }
  .grade-d   { color: #ff4444; border-color: rgba(255,68,68,0.4); background: rgba(255,68,68,0.07); }

  .rules-badge {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    padding: 3px 8px;
    border: 1px solid var(--border2);
    color: var(--text3);
    cursor: help;
    position: relative;
  }
  .badge-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border2);
    margin-bottom: 1rem;
    align-items: center;
  }
  .badge-legend-title {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--text3);
    text-transform: uppercase;
    margin-right: 4px;
  }
  .badge-legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text2);
  }
  .badge-legend-sep { color: var(--text3); font-size: 10px; }

  .verify-btn {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 5px 12px;
    background: none;
    border: 1px solid var(--border2);
    color: var(--text3);
    cursor: pointer;
    transition: all 0.15s;
    margin-left: auto;
  }
  .verify-btn:hover { color: var(--accent); border-color: var(--accent); }
  .verify-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .verification-panel {
    border: 1px solid var(--border2);
    background: var(--surface2);
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .verification-title {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .verification-result {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.7;
  }

  .verification-verdict {
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 12px;
    display: inline-block;
    border: 1px solid;
  }
  .verdict-yes { color: #00e676; border-color: rgba(0,230,118,0.3); background: rgba(0,230,118,0.07); }
  .verdict-partial { color: #ffd740; border-color: rgba(255,215,64,0.3); background: rgba(255,215,64,0.07); }
  .verdict-no { color: #ff4444; border-color: rgba(255,68,68,0.3); background: rgba(255,68,68,0.07); }

  .verify-loading {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text3);
    text-transform: uppercase;
    animation: blink 1s infinite;
  }

  @media (max-width: 600px) {
    .container { padding: 1rem; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .cards { grid-template-columns: 1fr; }
  }
</style>
<link rel="icon" type="image/png" href="https://i.imgur.com/ZP2pTk2.png">
<script src="nav.js"></script>
</head>
<body>

<header>
  <div class="logo">// Trade Journal</div>
  <div style="display:flex;gap:8px;align-items:center;">
    <button class="refresh-btn" onclick="exportCSV()">↓ CSV</button>
    <button class="refresh-btn" onclick="loadTrades()">↻ Refresh</button>
  </div>
</header>

<div class="container">
  <div class="stats-row">
    <div class="stat"><div class="stat-label">Trades</div><div class="stat-value" id="s-total">—</div></div>
    <div class="stat"><div class="stat-label">Win Rate</div><div class="stat-value" id="s-wr">—</div></div>
    <div class="stat"><div class="stat-label">Total P&L</div><div class="stat-value" id="s-pnl">—</div></div>
    <div class="stat"><div class="stat-label">Avg P&L</div><div class="stat-value" id="s-avg">—</div></div>
  </div>

  <div class="filters">
    <div class="conf-filter-wrap" id="conf-filter-wrap">
      <button class="conf-filter-btn" id="conf-filter-btn" onclick="toggleConfDropdown()" type="button">
        <span id="conf-btn-label">All confluences</span>
        <span class="arrow">▼</span>
      </button>
      <div class="conf-dropdown" id="conf-dropdown">
        <div class="conf-group-label">Structure</div>
        <label class="conf-option"><input type="checkbox" value="MSS" onchange="updateConfFilter()"> MSS — Market Structure Shift</label>
        <label class="conf-option"><input type="checkbox" value="Displacement" onchange="updateConfFilter()"> Displacement</label>
        <div class="conf-group-label">Entry (PDA Arrays)</div>
        <label class="conf-option"><input type="checkbox" value="IFVG" onchange="updateConfFilter()"> IFVG — Inverse Fair Value Gap</label>
        <label class="conf-option"><input type="checkbox" value="FVG" onchange="updateConfFilter()"> FVG — Fair Value Gap</label>
        <label class="conf-option"><input type="checkbox" value="CISD" onchange="updateConfFilter()"> CISD — Change in State of Delivery</label>
        <label class="conf-option"><input type="checkbox" value="Order Block" onchange="updateConfFilter()"> Order Block</label>
        <label class="conf-option"><input type="checkbox" value="Breaker Block" onchange="updateConfFilter()"> Breaker Block</label>
        <label class="conf-option"><input type="checkbox" value="Mitigation Block" onchange="updateConfFilter()"> Mitigation Block</label>
        <label class="conf-option"><input type="checkbox" value="PDA Array" onchange="updateConfFilter()"> PDA Array</label>
        <div class="conf-group-label">Liquidity</div>
        <label class="conf-option"><input type="checkbox" value="Liquidity Sweep" onchange="updateConfFilter()"> Liquidity Sweep</label>
        <label class="conf-option"><input type="checkbox" value="BSL Taken" onchange="updateConfFilter()"> BSL Taken</label>
        <label class="conf-option"><input type="checkbox" value="SSL Taken" onchange="updateConfFilter()"> SSL Taken</label>
        <label class="conf-option"><input type="checkbox" value="Equal Highs/Lows" onchange="updateConfFilter()"> Equal Highs / Lows</label>
        <label class="conf-option"><input type="checkbox" value="LRLR" onchange="updateConfFilter()"> LRLR — Low Resistance Liquidity Run</label>
        <div class="conf-group-label">Confluence</div>
        <label class="conf-option"><input type="checkbox" value="SMT Divergence" onchange="updateConfFilter()"> SMT Divergence</label>
        <label class="conf-option"><input type="checkbox" value="HTF PDA Delivery" onchange="updateConfFilter()"> HTF PDA Delivery</label>
        <label class="conf-option"><input type="checkbox" value="HTF Trend" onchange="updateConfFilter()"> HTF Trend</label>
        <label class="conf-option"><input type="checkbox" value="Retracement" onchange="updateConfFilter()"> Retracement</label>
        <label class="conf-option"><input type="checkbox" value="Clear Targets" onchange="updateConfFilter()"> Clear Targets</label>
        <label class="conf-option"><input type="checkbox" value="Volume" onchange="updateConfFilter()"> Volume</label>
        <label class="conf-option"><input type="checkbox" value="ATH" onchange="updateConfFilter()"> ATH — All Time High</label>
        <label class="conf-option"><input type="checkbox" value="Fib Target (-0.5)" onchange="updateConfFilter()"> Fib Target (-0.5)</label>
        <div class="conf-group-label">Model</div>
        <label class="conf-option"><input type="checkbox" value="Market Maker Model" onchange="updateConfFilter()"> Market Maker Model</label>
        <label class="conf-option"><input type="checkbox" value="Power of 3" onchange="updateConfFilter()"> Power of 3</label>
        <label class="conf-option"><input type="checkbox" value="Judas Swing" onchange="updateConfFilter()"> Judas Swing</label>
        <label class="conf-option"><input type="checkbox" value="Kill Zone" onchange="updateConfFilter()"> Kill Zone</label>
        <label class="conf-option"><input type="checkbox" value="NWOG" onchange="updateConfFilter()"> NWOG — New Week Opening Gap</label>
        <label class="conf-option"><input type="checkbox" value="NDOG" onchange="updateConfFilter()"> NDOG — New Day Opening Gap</label>
        <label class="conf-option"><input type="checkbox" value="Asian Range" onchange="updateConfFilter()"> Asian Range</label>
        <button class="conf-clear-btn" onclick="clearConfFilter()">✕ Clear selection</button>
      </div>
    </div>
    <select id="f-session" onchange="renderAll()">
      <option value="">All sessions</option>
      <option>Asia</option><option>London</option><option>NY AM</option><option>NY Lunch</option><option>NY PM</option><option>Overnight</option>
    </select>
    <select id="f-dir" onchange="renderAll()">
      <option value="">Long & Short</option>
      <option>Long</option><option>Short</option>
    </select>
    <select id="f-inst" onchange="renderAll()">
      <option value="">All instruments</option>
      <option>NQ</option><option>ES</option><option>MNQ</option><option>MES</option><option>CL</option><option>GC</option><option>RTY</option>
    </select>
    <select id="f-outcome" onchange="renderAll()">
      <option value="">All outcomes</option>
      <option value="Closed - Win">Win</option>
      <option value="Closed - Loss">Loss</option>
      <option value="Breakeven">Breakeven</option>
    </select>
    <select id="f-grade" onchange="renderAll()">
      <option value="">All grades</option>
      <option>A++</option><option>A+</option><option>A</option><option>B</option><option>C</option><option>D</option>
    </select>

<script>
// !! REPLACE THIS with your Cloudflare Worker URL after deploying !!
const WORKER_URL = "https://trade-journal-proxy.daniel-mouldd.workers.dev";
const DATABASE_ID = "5398f956345943b7b12b2298bbb6e127";

let allTrades = [];

async function notionQuery(cursor) {
  const body = { page_size: 100 };
  if (cursor) body.start_cursor = cursor;

  const res = await fetch(`${WORKER_URL}/notion/databases/${DATABASE_ID}/query`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });

  if (!res.ok) throw new Error(`Worker error: ${res.status}`);
  return res.json();
}

async function getPageContent(pageId) {
  const res = await fetch(`${WORKER_URL}/notion/blocks/${pageId}/children`);
  if (!res.ok) return null;
  return res.json();
}

function extractText(richText) {
  if (!richText || !richText.length) return "";
  return richText.map(r => r.plain_text || "").join("");
}

function parseProps(page) {
  const props = page.properties;
  return {
    id: page.id,
    name: extractText(props["Trade Name"]?.title),
    instrument: props["Instrument"]?.select?.name || "",
    direction: props["Direction"]?.select?.name || "",
    session: props["Session"]?.select?.name || "",
    timeframe: props["Timeframe"]?.select?.name || "",
    entryPrice: props["Entry Price"]?.number,
    exitPrice: props["Exit Price"]?.number,
    stopLoss: props["Stop Loss"]?.number,
    takeProfit: props["Take Profit"]?.number,
    contracts: props["Contracts"]?.number,
    pnl: props["P&L ($)"]?.number,
    confluences: props["Confluences"]?.multi_select?.map(o => o.name) || [],
    status: props["Status"]?.select?.name || "",
    date: props["Date"]?.date?.start || "",
    entryTime: extractText(props["Entry Time"]?.rich_text),
    exitTime: extractText(props["Exit Time"]?.rich_text),
    notes: extractText(props["Notes"]?.rich_text),
    mistakes: extractText(props["Mistakes"]?.rich_text),
    lessons: extractText(props["Lessons Learned"]?.rich_text),
    grade: props["Setup Grade"]?.select?.name || "",
    followedRules: props["Followed Rules"]?.select?.name || "",
    htfTimeframe: extractText(props["HTF Timeframe"]?.rich_text),
    entryModel: extractText(props["Entry Model"]?.rich_text),
    rr: props["R:R"]?.number,
    duration: props["Duration (mins)"]?.number,
  };
}

function extractTVUrl(blocks) {
  if (!blocks?.results) return null;
  for (const block of blocks.results) {
    const type = block.type;
    const content = block[type];
    if (!content) continue;

    if (type === "bookmark" || type === "embed") {
      const u = content.url || "";
      if (u.includes("tradingview.com/x/")) return u;
    }

    const texts = content.rich_text || content.text || [];
    for (const t of texts) {
      const plain = t.plain_text || "";
      const href = t.href || t.text?.link?.url || "";
      const match = (plain + " " + href).match(/https:\/\/www\.tradingview\.com\/x\/[A-Za-z0-9]+\/?/);
      if (match) return match[0];
    }
  }
  return null;
}

async function loadTrades() {
  document.getElementById("main").innerHTML = `<div class="loading-state">Loading trades <span>...</span></div>`;
  document.getElementById("results-count").textContent = "";

  try {
    let pages = [];
    let cursor = null;
    do {
      const data = await notionQuery(cursor);
      pages = pages.concat(data.results || []);
      cursor = data.has_more ? data.next_cursor : null;
    } while (cursor);

    const trades = await Promise.all(pages.map(async page => {
      const t = parseProps(page);
      const content = await getPageContent(page.id);
      t.screenshotUrl = extractTVUrl(content);
      return t;
    }));

    allTrades = trades.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
    populateDateFilter();
    renderAll();

  } catch(e) {
    document.getElementById("main").innerHTML = `<div class="error-state">Error: ${e.message}<br><br>Make sure your Worker URL is set correctly in the HTML file.</div>`;
  }
}

function populateDateFilter() { /* date range inputs — no population needed */ }

function getFiltered() {
  const selectedConfs = Array.from(document.querySelectorAll('#conf-dropdown input[type=checkbox]:checked')).map(cb => cb.value);
  const session = document.getElementById("f-session").value;
  const dir = document.getElementById("f-dir").value;
  const inst = document.getElementById("f-inst").value;
  const outcome = document.getElementById("f-outcome").value;
  const grade = document.getElementById("f-grade").value;
  const rules = document.getElementById("f-rules").value;
  const tf = document.getElementById("f-tf").value;
  const sort = document.getElementById("f-sort").value;
  const dateFrom = document.getElementById("f-date-from")?.value || '';
  const dateTo = document.getElementById("f-date-to")?.value || '';

  let filtered = allTrades.filter(t => {
    if (selectedConfs.length > 0 && !selectedConfs.every(sc => t.confluences.includes(sc))) return false;
    if (session && t.session !== session) return false;
    if (dir && t.direction !== dir) return false;
    if (inst && t.instrument !== inst) return false;
    if (outcome && t.status !== outcome) return false;
    if (grade && t.grade !== grade) return false;
    if (rules && t.followedRules !== rules) return false;
    if (tf && t.timeframe !== tf) return false;
    if (dateFrom && t.date < dateFrom) return false;
    if (dateTo && t.date > dateTo) return false;
    return true;
  });

  if (sort === 'oldest') filtered.sort((a,b) => a.date.localeCompare(b.date));
  else if (sort === 'pnl-high') filtered.sort((a,b) => (b.pnl||0) - (a.pnl||0));
  else if (sort === 'pnl-low') filtered.sort((a,b) => (a.pnl||0) - (b.pnl||0));
  else filtered.sort((a,b) => b.date.localeCompare(a.date));

  return filtered;
}

function updateStats(trades) {
  const total = trades.length;
  const wins = trades.filter(t => t.status === "Closed - Win").length;
  const pnl = trades.reduce((s, t) => s + (t.pnl || 0), 0);
  const avg = total ? Math.round(pnl / total) : 0;

  document.getElementById("s-total").textContent = total;
  document.getElementById("s-wr").textContent = total ? Math.round((wins/total)*100) + "%" : "—";

  const pnlEl = document.getElementById("s-pnl");
  pnlEl.textContent = total ? (pnl >= 0 ? "+" : "-") + "$" + Math.abs(pnl).toLocaleString() : "—";
  pnlEl.className = "stat-value" + (pnl > 0 ? " pos" : pnl < 0 ? " neg" : "");

  const avgEl = document.getElementById("s-avg");
  avgEl.textContent = total ? (avg >= 0 ? "+" : "-") + "$" + Math.abs(avg).toLocaleString() : "—";
  avgEl.className = "stat-value" + (avg > 0 ? " pos" : avg < 0 ? " neg" : "");
}

function renderCard(t) {
  const pnl = t.pnl;
  const pnlStr = pnl != null ? (pnl >= 0 ? "+" : "-") + "$" + Math.abs(pnl).toLocaleString() : "—";
  const pnlClass = pnl > 0 ? "pos" : pnl < 0 ? "neg" : "";
  const badgeClass = t.status === "Closed - Win" ? "badge-win" : t.status === "Closed - Loss" ? "badge-loss" : "badge-be";
  const badgeText = t.status === "Closed - Win" ? "Win" : t.status === "Closed - Loss" ? "Loss" : t.status || "Open";
  const dirClass = t.direction === "Long" ? "long" : "short";

  function buildChartHtml(url) {
    if (!url) return `<div class="no-chart">No chart attached</div>`;
    const isImage = /\.(png|jpg|jpeg|gif|webp)(\?.*)?$/i.test(url) || url.includes('i.imgur.com') || (url.includes('imgur.com') && !url.includes('gallery'));
    if (isImage) {
      const imgUrl = url.includes('imgur.com/') && !url.includes('i.imgur.com') ? url.replace('imgur.com/', 'i.imgur.com/') : url;
      return `<img class="chart-img" src="${imgUrl}" alt="Trade chart" loading="lazy" />`;
    }
    return `<a class="chart-link" href="${url}" target="_blank" rel="noopener">
      <span>View chart on TradingView</span>
      <span class="chart-link-arrow">↗</span>
    </a>`;
  }
  const chartHtml = buildChartHtml(t.screenshotUrl);

  const notesHtml = [
    t.notes ? `<div class="note-item"><div class="field-label">Notes</div><div class="field-value">${t.notes}</div></div>` : "",
    t.mistakes ? `<div class="note-item"><div class="field-label">Mistakes</div><div class="field-value">${t.mistakes}</div></div>` : "",
    t.lessons ? `<div class="note-item"><div class="field-label">Lessons</div><div class="field-value">${t.lessons}</div></div>` : ""
  ].filter(Boolean).join("");

  const gradeClass = {'A++':'app','A+':'ap','A':'a','B':'b','C':'c','D':'d'}[t.grade] || '';
  const gradeBadge = t.grade ? `<span class="grade-badge grade-${gradeClass}">${t.grade}</span>` : '';
  const rulesBadge = t.followedRules ? `<span class="rules-badge">${t.followedRules}</span>` : '';

  return `<div class="card" id="card-${t.id}">
    <div class="card-top">
      <div>
        <div class="card-instrument">${t.instrument || "—"}</div>
        <div class="card-dir ${dirClass}">${t.direction || "—"}</div>
      </div>
      <div style="text-align:right">
        <div class="card-pnl ${pnlClass}">${pnlStr}</div>
        <div class="card-badges" style="justify-content:flex-end;margin-top:6px">
          <span class="badge ${badgeClass}">${badgeText}</span>
        </div>
      </div>
    </div>
    ${(gradeBadge || rulesBadge) ? `<div class="card-meta-row">${gradeBadge}${rulesBadge}<button class="verify-btn" onclick="verifyTrade('${t.id}', this)">⚡ Verify Rules</button></div>` : `<div class="card-meta-row"><button class="verify-btn" onclick="verifyTrade('${t.id}', this)">⚡ Verify Rules</button></div>`}
    <div id="verify-panel-${t.id}"></div>
    <div class="divider"></div>
    <div class="card-grid">
      <div><div class="field-label">Date</div><div class="field-value">${t.date || "—"}</div></div>
      <div><div class="field-label">Session</div><div class="field-value">${t.session || "—"}</div></div>
      <div><div class="field-label">Timeframe</div><div class="field-value">${t.timeframe || "—"}</div></div>
      <div><div class="field-label">Contracts</div><div class="field-value">${t.contracts != null ? t.contracts : "—"}</div></div>
      <div>
        <div class="field-label">Entry${t.entryTime ? " · " + t.entryTime : ""}</div>

        <div class="field-label">Exit${t.exitTime ? " · " + t.exitTime : ""}</div>

      <div><div class="field-label">Take Profit</div><div class="field-value">${t.takeProfit != null ? t.takeProfit.toLocaleString() : "—"}</div></div>
    </div>
    ${t.confluences.length ? `<div class="divider"></div><div class="confs">${t.confluences.map(c => `<span class="conf-tag">${c}</span>`).join("")}</div>` : ""}
    <div class="divider"></div>
    ${chartHtml}
    ${notesHtml ? `<div class="divider"></div><div class="notes-block">${notesHtml}</div>` : ""}
  </div>`;
}

const RULES_CONTEXT = `You are a trading rule verification assistant for an ICT/Dodgy iFVG futures trader. 
Here are their trading rules:
1. Sessions: All sessions ok, primary focus London & NY AM. Others allowed with extra scrutiny.
2. Top Down Analysis: Daily -> 4H -> 1H -> 15m -> 5m before entry. Must know HTF bias.
3. Entry Model: Any PDA array. Preferred: IFVG or FVG.
4. Liquidity Sweep: BSL/SSL preferred before entry. If none, need stronger confluences.
5. Stop Loss: Preferred above/below IFVG/FVG. Alt: nearest swing H/L only if tight. If neither works, skip trade.
6. Clear Target: Preferred to have liquidity or PDA target before entering. Don't trade into void.
7. Take Profit: Partial at TP1 + trail if significant H/L exists. Full exit at target if not. Don't move TP without reason.
8. Scaling In: 2nd contract on A+ setups only, on retracement into PDA.
9. Risk: Max 1-2% per trade.
10. Stop Trading: After 2 losses OR 1 big win OR 2-3 good wins. No chasing.
11. News: Avoid on weak setups (B or lower). A+ ok with caution.
12. Discipline: No trading tired/emotional. No revenge. No FOMO. Max 2-4 trades/day.
13. Journaling: Every trade journaled same day.

Given the trade details below, verify if the trader followed their rules. Be specific about which rules were followed, which were broken, and which cannot be determined from the data. End with a clear verdict: YES (followed rules), PARTIALLY (some rules broken or unclear), or NO (clear rule violations).

Keep your response concise — 4-6 bullet points max, then the verdict.`;

async function verifyTrade(tradeId, btn) {
  const panel = document.getElementById('verify-panel-' + tradeId);
  const trade = allTrades.find(t => t.id === tradeId);
  if (!trade) return;

  btn.disabled = true;
  btn.textContent = '...';
  panel.innerHTML = `<div class="verification-panel"><div class="verify-loading">Analysing trade against your rules...</div></div>`;

  const tradeData = `
Instrument: ${trade.instrument}
Direction: ${trade.direction}
Session: ${trade.session}
Timeframe: ${trade.timeframe}
Entry: ${trade.entryPrice} at ${trade.entryTime || 'unknown time'}
Exit: ${trade.exitPrice} at ${trade.exitTime || 'unknown time'}
Stop Loss: ${trade.stopLoss}
Take Profit: ${trade.takeProfit}
Contracts: ${trade.contracts}
P&L: $${trade.pnl}
Confluences: ${trade.confluences.join(', ') || 'none listed'}
Setup Grade: ${trade.grade || 'not graded'}
Outcome: ${trade.status}
Notes: ${trade.notes || 'none'}
Mistakes noted: ${trade.mistakes || 'none'}
Lessons: ${trade.lessons || 'none'}
  `.trim();

  try {
    const res = await fetch(WORKER_URL + '/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ trade: tradeData })
    });

    const data = await res.json();
    const text = data.result || 'No response.';

    // Detect verdict
    const upperText = text.toUpperCase();
    let verdictClass = 'verdict-partial';
    let verdictLabel = 'PARTIALLY ⚠️';
    if (upperText.includes('VERDICT: YES') || upperText.match(/\bVERDICT:\s*YES\b/)) {
      verdictClass = 'verdict-yes'; verdictLabel = 'FOLLOWED RULES ✅';
    } else if (upperText.includes('VERDICT: NO') || upperText.match(/\bVERDICT:\s*NO\b/)) {
      verdictClass = 'verdict-no'; verdictLabel = 'RULES BROKEN ❌';
    } else if (upperText.includes('VERDICT: PARTIALLY') || upperText.includes('PARTIALLY')) {
      verdictClass = 'verdict-partial'; verdictLabel = 'PARTIALLY ⚠️';
    }

    // Format text — convert bullet points
    const formatted = text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/^[•\-\*] /gm, '→ ')
      .replace(/\n/g, '<br>');

    panel.innerHTML = `
      <div class="verification-panel">
        <div class="verification-title">⚡ Rule Verification</div>
        <div class="verification-result">${formatted}</div>
        <div><span class="verification-verdict ${verdictClass}">${verdictLabel}</span></div>
      </div>`;

    btn.textContent = '↺ Re-verify';
    btn.disabled = false;

  } catch(e) {
    panel.innerHTML = `<div class="verification-panel"><div class="verification-result" style="color:var(--red)">Error: ${e.message}</div></div>`;
    btn.textContent = '⚡ Verify Rules';
    btn.disabled = false;
  }
}

// ---- CSV Export ----
function exportCSV() {
  if (!allTrades.length) return;
  const headers = ['Date','Instrument','Direction','Session','Timeframe','Entry Time','Entry','Exit Time','Exit','Stop Loss','Take Profit','Contracts','P&L','Confluences','Grade','Followed Rules','Notes','Mistakes','Lessons'];
  const rows = allTrades.map(t => [
    t.date, t.instrument, t.direction, t.session, t.timeframe,
    t.entryTime, t.entryPrice, t.exitTime, t.exitPrice,
    t.stopLoss, t.takeProfit, t.contracts, t.pnl,
    '"' + t.confluences.join(', ') + '"',
    t.grade, t.followedRules,
    '"' + (t.notes||'').replace(/"/g,"'") + '"',
    '"' + (t.mistakes||'').replace(/"/g,"'") + '"',
    '"' + (t.lessons||'').replace(/"/g,"'") + '"'
  ].join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'trade-journal.csv'; a.click();
  URL.revokeObjectURL(url);
}

// ---- Rule Breacher Tracker ----
function getRuleBreaches() {
  const breaches = {
    'Stop Loss Management': 0,
    'HTF Bias Alignment': 0,
    'Trailing Too Soon': 0,
    'Overtrading': 0,
    'FOMO / Impatient Entry': 0,
    'Scale-in on Non A+ Setup': 0,
    'No Clear Target': 0,
    'News Avoidance': 0,
  };
  allTrades.forEach(t => {
    const text = ((t.mistakes||'') + ' ' + (t.notes||'') + ' ' + (t.lessons||'')).toLowerCase();
    if (text.includes('stop') && (text.includes('be') || text.includes('breakeven') || text.includes('moved'))) breaches['Stop Loss Management']++;
    if (text.includes('bias') || text.includes('htf') || text.includes('against')) breaches['HTF Bias Alignment']++;
    if (text.includes('trail') && (text.includes('soon') || text.includes('tight') || text.includes('tsl'))) breaches['Trailing Too Soon']++;
    if (text.includes('overtrad') || text.includes('too many')) breaches['Overtrading']++;
    if (text.includes('fomo') || text.includes('impatient') || text.includes('patient') || text.includes('chased')) breaches['FOMO / Impatient Entry']++;
    if (text.includes('scale') || text.includes('second contract') || text.includes('2nd')) breaches['Scale-in on Non A+ Setup']++;
    if (text.includes('no target') || text.includes('void') || text.includes('target')) breaches['No Clear Target']++;
    if (text.includes('news')) breaches['News Avoidance']++;
  });
  return Object.entries(breaches).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
}

function clearAllFilters() {
  document.getElementById('f-session').value = '';
  document.getElementById('f-dir').value = '';
  document.getElementById('f-inst').value = '';
  document.getElementById('f-outcome').value = '';
  document.getElementById('f-grade').value = '';
  document.getElementById('f-rules').value = '';
  document.getElementById('f-tf').value = '';
  document.getElementById('f-sort').value = 'newest';
  document.getElementById('f-date-from').value = '';
  document.getElementById('f-date-to').value = '';
  clearConfFilter();
  renderAll();
}

let confDropdownOpen = false;

function toggleConfDropdown() {
  confDropdownOpen = !confDropdownOpen;
  document.getElementById('conf-dropdown').classList.toggle('open', confDropdownOpen);
  document.getElementById('conf-filter-btn').classList.toggle('open', confDropdownOpen);
}

// Close dropdown when clicking outside
document.addEventListener('click', function(e) {
  const wrap = document.querySelector('.conf-filter-wrap');
  if (wrap && !wrap.contains(e.target)) {
    confDropdownOpen = false;
    document.getElementById('conf-dropdown').classList.remove('open');
    document.getElementById('conf-filter-btn').classList.remove('open');
  }
});

function updateConfFilter() {
  const checked = Array.from(document.querySelectorAll('#conf-dropdown input[type=checkbox]:checked')).map(cb => cb.value);
  const label = document.getElementById('conf-btn-label');
  if (checked.length === 0) label.textContent = 'All confluences';
  else if (checked.length === 1) label.textContent = checked[0];
  else label.textContent = `${checked.length} confluences selected`;
  // Update checked styling
  document.querySelectorAll('.conf-option').forEach(opt => {
    opt.classList.toggle('checked', opt.querySelector('input').checked);
  });
  renderAll();
}

function clearConfFilter() {
  document.querySelectorAll('#conf-dropdown input[type=checkbox]').forEach(cb => cb.checked = false);
  updateConfFilter();
}

function renderAll() {
  const filtered = getFiltered();
  updateStats(filtered);
  document.getElementById("results-count").textContent = `${filtered.length} trade${filtered.length !== 1 ? "s" : ""}`;

  if (!filtered.length) {
    document.getElementById("main").innerHTML = `<div class="empty-state">No trades match your filters</div>`;
    return;
  }
  document.getElementById("main").innerHTML = `<div class="cards">${filtered.map(renderCard).join("")}</div>`;
}

document.addEventListener("DOMContentLoaded", () => initNav("index"));
initConfDropdown();
loadTrades();
</script>
</body>
</html>
