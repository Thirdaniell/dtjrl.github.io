<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bias Board — FTJ</title>
<link rel="icon" type="image/png" href="https://i.imgur.com/ZP2pTk2.png">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="nav.js"></script>
<style>
:root {
  --bg:#0a0a0a;--surface:#111;--surface2:#181818;
  --border:#1a1a1a;--border2:#2a2a2a;
  --text:#e8e8e8;--text2:#888;--text3:#444;
  --green:#00e676;--red:#ff4444;--yellow:#ffd740;--accent:#c8ff00;
  --mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

.page{max-width:900px;margin:0 auto;padding:3rem 2rem 5rem;}
.eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:0.2em;color:var(--accent);text-transform:uppercase;margin-bottom:8px;}
.page-title{font-family:var(--mono);font-size:28px;font-weight:700;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--text2);margin-bottom:2.5rem;line-height:1.6;}

/* TODAY SECTION */
.today-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);margin-bottom:2rem;}
.today-card{background:var(--surface);padding:1.5rem;}
.today-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.instrument-badge{font-family:var(--mono);font-size:11px;letter-spacing:0.1em;padding:3px 10px;border:1px solid;}
.instrument-nq{color:#c8ff00;border-color:rgba(200,255,0,0.3);}
.instrument-es{color:#40c4ff;border-color:rgba(64,196,255,0.3);}
.date-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:0.08em;}

/* CURRENT BIAS DISPLAY */
.bias-display{margin-bottom:1.25rem;}
.bias-label{font-family:var(--mono);font-size:9px;letter-spacing:0.15em;color:var(--text3);text-transform:uppercase;margin-bottom:6px;}
.bias-value{font-family:var(--mono);font-size:28px;font-weight:700;line-height:1;}
.bias-bull{color:var(--green);}
.bias-bear{color:var(--red);}
.bias-range{color:var(--yellow);}
.bias-wait{color:var(--text3);}
.bias-none{color:var(--border2);}

.switch-badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;padding:4px 10px;border:1px solid var(--border2);color:var(--text3);margin-top:8px;}
.switch-arrow{font-size:12px;}

/* BIAS BUTTONS */
.bias-btn-group{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:8px;}
.bias-btn{font-family:var(--mono);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;padding:8px 4px;background:var(--surface2);border:1px solid var(--border2);color:var(--text3);cursor:pointer;transition:all 0.15s;}
.bias-btn:hover{border-color:var(--text2);color:var(--text);}
.bias-btn.bull:hover,.bias-btn.bull.active{border-color:var(--green);color:var(--green);background:rgba(0,230,118,0.08);}
.bias-btn.bear:hover,.bias-btn.bear.active{border-color:var(--red);color:var(--red);background:rgba(255,68,68,0.08);}
.bias-btn.range:hover,.bias-btn.range.active{border-color:var(--yellow);color:var(--yellow);background:rgba(255,215,64,0.08);}
.bias-btn.wait:hover,.bias-btn.wait.active{border-color:var(--text2);color:var(--text2);background:rgba(136,136,136,0.08);}
.bias-btn:disabled{opacity:0.3;cursor:not-allowed;}

.notes-input{font-family:var(--sans);font-size:12px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:8px 10px;width:100%;outline:none;resize:none;min-height:50px;margin-bottom:8px;line-height:1.5;transition:border-color 0.15s;}
.notes-input:focus{border-color:var(--accent);}
.notes-input:disabled{opacity:0.4;cursor:not-allowed;}

.set-btn{font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;padding:8px 16px;background:var(--accent);color:#000;border:none;cursor:pointer;font-weight:700;width:100%;transition:opacity 0.15s;}
.set-btn:hover{opacity:0.85;}
.set-btn:disabled{opacity:0.3;cursor:not-allowed;}
.set-btn.switch-mode{background:var(--surface2);color:var(--text2);border:1px solid var(--border2);}
.set-btn.switch-mode:hover{border-color:var(--yellow);color:var(--yellow);}

.locked-msg{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:0.06em;text-align:center;padding:6px;margin-top:4px;}

/* HISTORY */
.section-title{font-family:var(--mono);font-size:9px;letter-spacing:0.2em;color:var(--text3);text-transform:uppercase;margin-bottom:10px;margin-top:2.5rem;}
.history-list{display:flex;flex-direction:column;gap:1px;background:var(--border);}
.history-row{background:var(--surface);display:grid;grid-template-columns:100px 60px 1fr 1fr auto;gap:12px;align-items:center;padding:12px 16px;}
.history-row:hover{background:var(--surface2);}
.h-date{font-family:var(--mono);font-size:11px;color:var(--text2);}
.h-inst{font-family:var(--mono);font-size:10px;letter-spacing:0.08em;color:var(--text3);}
.h-bias{font-family:var(--mono);font-size:12px;font-weight:700;}
.h-switch{font-family:var(--mono);font-size:10px;color:var(--text3);display:flex;align-items:center;gap:6px;}
.h-notes{font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.empty-state{text-align:center;padding:3rem;font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;background:var(--surface);}
.loading-state{text-align:center;padding:3rem;font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:0.1em;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

body.light .today-card{background:#fff;}
body.light .bias-btn{background:#f5f5f5;border-color:#ddd;}
body.light .notes-input{background:#f5f5f5;border-color:#ddd;}
body.light .history-row{background:#fff;}
body.light .history-row:hover{background:#f5f5f5;}
body.light .history-list{background:#e0e0e0;}
body.light .today-grid{background:#e0e0e0;}

@media(max-width:600px){.today-grid{grid-template-columns:1fr;}.history-row{grid-template-columns:80px 50px 1fr;}.h-switch,.h-notes{display:none;}.page{padding:2rem 1rem 5rem;}}
</style>
</head>
<body>
<div class="page">
  <div class="eyebrow">// Market Bias</div>
  <div class="page-title">Bias Board</div>
  <div class="page-sub">Set your daily HTF bias before trading. Bias is locked once set — you can switch once per day per instrument if market conditions change.</div>

  <!-- TODAY -->
  <div class="today-grid">
    <!-- NQ -->
    <div class="today-card" id="card-NQ">
      <div class="today-card-header">
        <span class="instrument-badge instrument-nq">NQ</span>
        <span class="date-label" id="today-label"></span>
      </div>
      <div class="bias-display">
        <div class="bias-label">Current Bias</div>
        <div class="bias-value bias-none" id="bias-val-NQ">—</div>
        <div id="switch-badge-NQ" style="display:none;" class="switch-badge">
          <span class="switch-arrow">→</span>
          <span id="switch-val-NQ"></span>
        </div>
      </div>
      <div class="bias-btn-group" id="btns-NQ">
        <button class="bias-btn bull" onclick="selectBias('NQ','Bullish')">Bullish</button>
        <button class="bias-btn bear" onclick="selectBias('NQ','Bearish')">Bearish</button>
        <button class="bias-btn range" onclick="selectBias('NQ','Ranging')">Ranging</button>
        <button class="bias-btn wait" onclick="selectBias('NQ','Waiting')">Waiting</button>
      </div>
      <textarea class="notes-input" id="notes-NQ" placeholder="Notes (optional) — key levels, reasoning..."></textarea>
      <button class="set-btn" id="set-btn-NQ" onclick="submitBias('NQ')">Set NQ Bias</button>
      <div class="locked-msg" id="locked-NQ" style="display:none;"></div>
    </div>
    <!-- ES -->
    <div class="today-card" id="card-ES">
      <div class="today-card-header">
        <span class="instrument-badge instrument-es">ES</span>
        <span class="date-label"></span>
      </div>
      <div class="bias-display">
        <div class="bias-label">Current Bias</div>
        <div class="bias-value bias-none" id="bias-val-ES">—</div>
        <div id="switch-badge-ES" style="display:none;" class="switch-badge">
          <span class="switch-arrow">→</span>
          <span id="switch-val-ES"></span>
        </div>
      </div>
      <div class="bias-btn-group" id="btns-ES">
        <button class="bias-btn bull" onclick="selectBias('ES','Bullish')">Bullish</button>
        <button class="bias-btn bear" onclick="selectBias('ES','Bearish')">Bearish</button>
        <button class="bias-btn range" onclick="selectBias('ES','Ranging')">Ranging</button>
        <button class="bias-btn wait" onclick="selectBias('ES','Waiting')">Waiting</button>
      </div>
      <textarea class="notes-input" id="notes-ES" placeholder="Notes (optional) — key levels, reasoning..."></textarea>
      <button class="set-btn" id="set-btn-ES" onclick="submitBias('ES')">Set ES Bias</button>
      <div class="locked-msg" id="locked-ES" style="display:none;"></div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="section-title">Bias History</div>
  <div id="history-container"><div class="loading-state">Loading history...</div></div>
</div>

<script>
const WORKER = 'https://trade-journal-proxy.daniel-mouldd.workers.dev';
const BIAS_DB = 'c163f7373bb44be19ae4f4a886384ddf';
const TODAY = new Date().toISOString().split('T')[0];

const selected = { NQ: null, ES: null };
const state = { NQ: null, ES: null }; // { bias, switchBias, switched, pageId }

// Set today label
const d = new Date();
document.getElementById('today-label').textContent = d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
document.querySelectorAll('.today-card-header .date-label').forEach(el => el.textContent = d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }));

function biasClass(b) {
  if (!b) return 'bias-none';
  return {'Bullish':'bias-bull','Bearish':'bias-bear','Ranging':'bias-range','Waiting':'bias-wait'}[b] || 'bias-none';
}

function selectBias(inst, bias) {
  selected[inst] = bias;
  document.querySelectorAll(`#btns-${inst} .bias-btn`).forEach(btn => btn.classList.remove('active'));
  const map = {'Bullish':'bull','Bearish':'bear','Ranging':'range','Waiting':'wait'};
  document.querySelector(`#btns-${inst} .${map[bias]}`).classList.add('active');
}

async function notionQuery(dbId, filter) {
  const body = { page_size: 100 };
  if (filter) body.filter = filter;
  const res = await fetch(`${WORKER}/notion/databases/${dbId}/query`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return res.json();
}

async function notionCreate(props) {
  const res = await fetch(`${WORKER}/notion/pages`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ parent: { database_id: BIAS_DB }, properties: props })
  });
  return res.json();
}

function extractText(rt) { return (rt||[]).map(r => r.plain_text||'').join(''); }

async function loadToday() {
  try {
    const data = await notionQuery(BIAS_DB, {
      and: [
        { property: 'Date', date: { equals: TODAY } }
      ]
    });

    ['NQ','ES'].forEach(inst => {
      const entries = (data.results||[]).filter(p => p.properties['Instrument']?.select?.name === inst);
      const original = entries.find(p => !p.properties['switched']?.checkbox);
      const switched = entries.find(p => p.properties['switched']?.checkbox);

      if (original) {
        const bias = original.properties['Bias']?.select?.name;
        const switchBias = switched?.properties['Bias']?.select?.name || null;
        state[inst] = { bias, switchBias, pageId: original.id };
        updateCardLocked(inst, bias, switchBias, !!switched);
      }
    });
  } catch(e) {
    console.error('loadToday error', e);
  }
}

function updateCardLocked(inst, bias, switchBias, hasSwitched) {
  const valEl = document.getElementById(`bias-val-${inst}`);
  const switchEl = document.getElementById(`switch-badge-${inst}`);
  const switchValEl = document.getElementById(`switch-val-${inst}`);
  const btn = document.getElementById(`set-btn-${inst}`);
  const lockedEl = document.getElementById(`locked-${inst}`);
  const notesEl = document.getElementById(`notes-${inst}`);

  // Show current bias (effective = switchBias if switched, else bias)
  const effective = switchBias || bias;
  valEl.className = 'bias-value ' + biasClass(effective);
  valEl.textContent = effective || '—';

  // Show switch badge if switched
  if (switchBias) {
    switchEl.style.display = 'flex';
    switchValEl.textContent = `Switched from ${bias}`;
  }

  // Disable all bias buttons
  document.querySelectorAll(`#btns-${inst} .bias-btn`).forEach(b => b.disabled = true);
  notesEl.disabled = true;
  notesEl.placeholder = '';

  if (hasSwitched) {
    // Both original and switch used — fully locked
    btn.disabled = true;
    btn.textContent = 'Locked for today';
    lockedEl.style.display = 'block';
    lockedEl.textContent = 'Bias + switch used — locked until tomorrow';
  } else {
    // Original set, switch still available
    btn.classList.add('switch-mode');
    btn.textContent = `↺ Switch ${inst} Bias`;
    btn.disabled = false;
    btn.onclick = () => openSwitch(inst, bias);
    lockedEl.style.display = 'block';
    lockedEl.textContent = 'Bias locked · 1 switch remaining today';
  }
}

function openSwitch(inst, originalBias) {
  // Re-enable buttons for switch selection
  document.querySelectorAll(`#btns-${inst} .bias-btn`).forEach(b => {
    b.disabled = false;
    b.onclick = () => selectBias(inst, b.textContent.trim() === 'Bullish' ? 'Bullish' : b.textContent.trim() === 'Bearish' ? 'Bearish' : b.textContent.trim() === 'Ranging' ? 'Ranging' : 'Waiting');
  });
  const notesEl = document.getElementById(`notes-${inst}`);
  notesEl.disabled = false;
  notesEl.placeholder = 'Why are you switching bias?';

  const btn = document.getElementById(`set-btn-${inst}`);
  btn.classList.remove('switch-mode');
  btn.textContent = `Confirm ${inst} Switch`;
  btn.onclick = () => submitSwitch(inst, originalBias);

  document.getElementById(`locked-${inst}`).textContent = 'Select new bias and confirm switch';
}

async function submitBias(inst) {
  const bias = selected[inst];
  if (!bias) { alert(`Please select a bias for ${inst}`); return; }

  const btn = document.getElementById(`set-btn-${inst}`);
  btn.disabled = true;
  btn.textContent = 'Saving...';

  const notes = document.getElementById(`notes-${inst}`).value.trim();
  const title = `${inst} ${bias} — ${TODAY}`;

  const props = {
    "Title": { title: [{ text: { content: title } }] },
    "Instrument": { select: { name: inst } },
    "Bias": { select: { name: bias } },
    "Date": { date: { start: TODAY } },
    "switched": { checkbox: false }
  };
  if (notes) props["Notes"] = { rich_text: [{ text: { content: notes } }] };

  try {
    const data = await notionCreate(props);
    if (data.id) {
      state[inst] = { bias, switchBias: null, pageId: data.id };
      updateCardLocked(inst, bias, null, false);
      loadHistory();
    }
  } catch(e) {
    btn.disabled = false;
    btn.textContent = `Set ${inst} Bias`;
    alert('Error: ' + e.message);
  }
}

async function submitSwitch(inst, originalBias) {
  const newBias = selected[inst];
  if (!newBias) { alert(`Select a new bias for ${inst}`); return; }
  if (newBias === originalBias) { alert(`New bias is the same as current — pick a different one`); return; }

  const btn = document.getElementById(`set-btn-${inst}`);
  btn.disabled = true;
  btn.textContent = 'Saving switch...';

  const notes = document.getElementById(`notes-${inst}`).value.trim();
  const title = `${inst} Switch → ${newBias} — ${TODAY}`;

  const props = {
    "Title": { title: [{ text: { content: title } }] },
    "Instrument": { select: { name: inst } },
    "Bias": { select: { name: newBias } },
    "Date": { date: { start: TODAY } },
    "switched": { checkbox: true }
  };
  if (notes) props["Notes"] = { rich_text: [{ text: { content: notes } }] };

  try {
    const data = await notionCreate(props);
    if (data.id) {
      state[inst].switchBias = newBias;
      updateCardLocked(inst, originalBias, newBias, true);
      loadHistory();
    }
  } catch(e) {
    btn.disabled = false;
    btn.textContent = `Confirm ${inst} Switch`;
    alert('Error: ' + e.message);
  }
}

async function loadHistory() {
  const container = document.getElementById('history-container');
  try {
    const data = await notionQuery(BIAS_DB);
    const pages = (data.results||[]).sort((a,b) => {
      const da = a.properties['Date']?.date?.start || '';
      const db2 = b.properties['Date']?.date?.start || '';
      return db2.localeCompare(da);
    });

    if (!pages.length) {
      container.innerHTML = '<div class="empty-state">No bias entries yet — set today\'s bias above</div>';
      return;
    }

    // Group by date
    const grouped = {};
    pages.forEach(p => {
      const date = p.properties['Date']?.date?.start || '—';
      if (!grouped[date]) grouped[date] = [];
      grouped[date].push(p);
    });

    const rows = Object.entries(grouped).map(([date, entries]) => {
      return entries.map(p => {
        const inst = p.properties['Instrument']?.select?.name || '—';
        const bias = p.properties['Bias']?.select?.name || '—';
        const isSwitched = p.properties['switched']?.checkbox;
        const notes = extractText(p.properties['Notes']?.rich_text);
        const bClass = biasClass(bias);
        const switchLabel = isSwitched ? `<span style="color:var(--yellow);margin-right:4px;">↺</span> Switch →` : '';
        const d2 = new Date(date + 'T12:00:00');
        const dateStr = d2.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
        return `<div class="history-row">
          <div class="h-date">${dateStr}</div>
          <div class="h-inst" style="color:${inst==='NQ'?'#c8ff00':'#40c4ff'}">${inst}</div>
          <div class="h-bias ${bClass}">${isSwitched ? switchLabel : ''}${bias}</div>
          <div class="h-notes">${notes || '—'}</div>
        </div>`;
      }).join('');
    }).join('');

    container.innerHTML = `<div class="history-list">${rows}</div>`;
  } catch(e) {
    container.innerHTML = `<div class="empty-state">Error loading history: ${e.message}</div>`;
  }
}

document.addEventListener('DOMContentLoaded', async () => {
  initNav('bias');
  await loadToday();
  await loadHistory();
});
</script>
</body>
</html>
